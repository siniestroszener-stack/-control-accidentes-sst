<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Control de Accidentes SST — Zener Austral</title>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    /* =====================================================================
       CONFIGURACIÓN — edita estos 3 valores para tu cuenta/planilla/carpeta.
       Este archivo es autocontenido: toda la configuración vive aquí, no
       hay variables de entorno ni backend. Instrucciones completas al
       final de este archivo (busca GUIA_CONFIGURACION), y también aparecen
       dentro de la app la primera vez que la abres si falta algún dato.
       ===================================================================== */
    const CONFIG = {
      // Client ID de OAuth 2.0 (tipo "Aplicación web") creado en Google Cloud
      // Console para el proyecto donde habilitaste Sheets API y Drive API.
      CLIENT_ID: '1062246310358-avg5cag54h3lffcpp8f9g9mgrf8a5e3k.apps.googleusercontent.com',

      // ID de la planilla madre. Queda vacío la primera vez — usa el botón
      // "Crear estructura inicial" dentro de la app (aparece automáticamente
      // si esto está vacío) y pega aquí el ID que te muestre al terminar.
      SPREADSHEET_ID: '',

      // ID de la carpeta raíz en Drive. Igual que arriba: se completa con
      // el mismo botón de configuración inicial.
      ROOT_FOLDER_ID: '',

      // Permisos que pide el login. spreadsheets = leer/escribir la planilla.
      // drive = crear carpetas/archivos. userinfo = para saber tu nombre y
      // correo automáticamente al conectarte (no hay que escribirlo a mano).
      SCOPES: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive ' +
              'https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile'
    };
  </script>
  <style>
  /* ─────────────────────────────────────────────────────────────
     Sistema de diseño — Control de Accidentes SST
     Paleta inspirada en herramientas de control técnico/industrial:
     azul-grafito como base (autoridad, calma), naranja de seguridad
     como acento (color estándar de EPP/señalización en terreno).
     Tipografía IBM Plex: familia técnica y legible, con una variante
     mono para identificadores (ID de caso, RUT, folios) — encuentra
     visualmente la diferencia entre "dato" y "prosa".

     ───────────────────────────────────────────────────────────── */

  :root {
    /* Paleta corporativa Zener Austral — extraída directamente del logo:
       #182454 navy, #6C90B4 azul acero, #FCCC00 dorado, #D80C0C rojo.
       Los tonos "operativos" (acento, alerta) son variantes ajustadas de
       esos mismos colores para que el texto blanco/negro siga siendo
       legible sobre ellos (WCAG AA) — la familia de color es la misma. */
    --color-primario: #182454;
    --color-primario-claro: #2D3F6C;
    --color-acento: #4E6E8E;
    --color-acento-suave: #EAEFF4;

    --bg: #F5F6F8;
    --superficie: #FFFFFF;
    --borde: #E1E5EA;

    --texto: #1B2530;
    --texto-secundario: #5C6B7A;
    --texto-tenue: #8A97A3;

    --estado-ok: #2F8659;
    --estado-ok-bg: #E4F3EB;
    --estado-alerta: #8A7000;
    --estado-alerta-bg: #FEF8E0;
    --estado-critico: #D80C0C;
    --estado-critico-bg: #FBE6E6;
    --estado-info: #3D6E92;
    --estado-info-bg: #E4EEF4;
    --estado-neutro: #6B7684;
    --estado-neutro-bg: #EBEDF0;

    --radio: 8px;
    --radio-chico: 5px;
    --sombra: 0 1px 2px rgba(24, 36, 84, 0.06), 0 1px 8px rgba(24, 36, 84, 0.04);
    --sombra-flotante: 0 8px 24px rgba(24, 36, 84, 0.14);

    --fuente: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --fuente-condensada: 'IBM Plex Sans Condensed', var(--fuente);
    --fuente-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--texto);
    font-family: var(--fuente);
    font-size: 14px;
    height: 100%;
    overflow: hidden; /* el scroll real vive dentro de #contenido — sidebar y topbar quedan fijos */
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 {
    font-family: var(--fuente-condensada);
    font-weight: 600;
    margin: 0 0 4px 0;
    color: var(--color-primario);
    letter-spacing: 0.01em;
  }
  h1 { font-size: 22px; }
  h2 { font-size: 18px; }
  h3 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--texto-secundario); }

  p { margin: 0 0 8px 0; }

  a { color: var(--color-primario-claro); }

  .mono { font-family: var(--fuente-mono); font-size: 13px; letter-spacing: -0.01em; }

  button, input, select, textarea { font-family: inherit; font-size: inherit; }

  /* ── Layout general ─────────────────────────────────────────── */

  #app { display: flex; height: 100vh; }

  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--color-primario);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    overflow-y: auto;
  }

  #sidebar .marca {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 16px;
  }
  #sidebar .marca img { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; background: #fff; }
  #sidebar .marca-textos { display: flex; flex-direction: column; min-width: 0; }
  #sidebar .marca-empresa { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #sidebar .marca-sistema { font-family: var(--fuente-condensada); font-weight: 600; font-size: 14px; color: #fff; }

  #sidebar nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radio-chico);
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    transition: background 0.12s ease, color 0.12s ease;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.activo { background: var(--color-acento); color: #fff; }
  .nav-item .icono { width: 16px; text-align: center; opacity: 0.9; }

  #sidebar .usuario-actual {
    margin-top: auto;
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 12px;
    color: rgba(255,255,255,0.65);
  }
  #sidebar .usuario-actual .u-nombre { color: #fff; font-weight: 600; display: block; margin-bottom: 2px; }
  #sidebar .usuario-actual .u-rol {
    display: inline-block; margin-top: 4px;
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 2px 8px; border-radius: 20px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.03em;
  }

  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  #topbar {
    min-height: 56px; flex-shrink: 0;
    background: var(--superficie);
    border-bottom: 1px solid var(--borde);
    display: flex; flex-direction: column; justify-content: center;
    padding: 9px 24px;
  }
  #topbar h1 { margin: 0; }
  #topbar-breadcrumb { font-size: 12px; color: var(--texto-tenue); min-height: 15px; margin-bottom: 2px; }
  #topbar-breadcrumb a { color: var(--color-acento); text-decoration: none; }
  #topbar-breadcrumb a:hover { text-decoration: underline; }
  #topbar-breadcrumb .breadcrumb-sep { color: var(--borde); margin: 0 3px; }
  #topbar-breadcrumb .breadcrumb-actual { color: var(--texto-secundario); font-weight: 600; }

  #contenido { flex: 1; padding: 24px; overflow-y: auto; }

  .vista { display: none; }
  .vista.activa { display: block; animation: aparecer 0.15s ease; }
  @keyframes aparecer { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Componentes ────────────────────────────────────────────── */

  .tarjeta {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 18px 20px;
  }

  .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }

  .grid-desglose { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; margin-bottom: 24px; }

  .kpi { padding: 16px 18px; border-left: 3px solid var(--color-acento); }
  .kpi .kpi-valor { font-family: var(--fuente-condensada); font-size: 30px; font-weight: 600; color: var(--color-primario); line-height: 1; }
  .kpi .kpi-etiqueta { margin-top: 6px; font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; letter-spacing: 0.03em; }
  .kpi.critico { border-left-color: var(--estado-critico); }
  .kpi.critico .kpi-valor { color: var(--estado-critico); }
  .kpi.alerta { border-left-color: var(--estado-alerta); }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .pill-ok { background: var(--estado-ok-bg); color: var(--estado-ok); }
  .pill-alerta { background: var(--estado-alerta-bg); color: var(--estado-alerta); }
  .pill-critico { background: var(--estado-critico-bg); color: var(--estado-critico); }
  .pill-info { background: var(--estado-info-bg); color: var(--estado-info); }
  .pill-neutro { background: var(--estado-neutro-bg); color: var(--estado-neutro); }

  table.tabla { width: 100%; border-collapse: collapse; }
  table.tabla th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--texto-secundario); font-weight: 600;
    padding: 10px 12px; border-bottom: 2px solid var(--borde);
  }
  table.tabla td { padding: 11px 12px; border-bottom: 1px solid var(--borde); font-size: 13.5px; vertical-align: middle; }
  table.tabla tbody tr { cursor: pointer; transition: background 0.1s ease; }
  table.tabla tbody tr:hover { background: #FAFBFC; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radio-chico);
    border: 1px solid transparent;
    font-weight: 600; font-size: 13px; cursor: pointer;
    transition: filter 0.12s ease, background 0.12s ease;
  }
  .btn:active { filter: brightness(0.94); }
  .btn-primario { background: var(--color-acento); color: #fff; }
  .btn-primario:hover { background: #D1691F; }
  .btn-secundario { background: var(--superficie); color: var(--color-primario); border-color: var(--borde); }
  .btn-secundario:hover { background: #F1F3F5; }
  .btn-texto { background: transparent; color: var(--color-primario-claro); padding: 6px 8px; }
  .btn-texto:hover { text-decoration: underline; }
  .btn-peligro { background: var(--estado-critico-bg); color: var(--estado-critico); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 18px; }
  @media (max-width: 900px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }

  .campo { display: flex; flex-direction: column; gap: 5px; }
  .campo.span-2 { grid-column: span 2; }
  .campo.span-3 { grid-column: span 3; }
  .campo label { font-size: 12px; font-weight: 600; color: var(--texto-secundario); }
  .campo input, .campo select, .campo textarea {
    padding: 8px 10px; border: 1px solid var(--borde); border-radius: var(--radio-chico);
    background: var(--superficie); color: var(--texto);
  }
  .campo input:focus, .campo select:focus, .campo textarea:focus {
    outline: none; border-color: var(--color-acento); box-shadow: 0 0 0 3px var(--color-acento-suave);
  }
  .campo textarea { resize: vertical; min-height: 70px; }

  .seccion-titulo {
    display: flex; align-items: center; justify-content: space-between;
    margin: 28px 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid var(--borde);
  }
  .seccion-titulo:first-child { margin-top: 0; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--borde); margin-bottom: 18px; }
  .tab {
    padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--texto-secundario);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--texto); }
  .tab.activo { color: var(--color-primario); border-bottom-color: var(--color-acento); }

  .checklist-categoria { margin-bottom: 22px; }
  .checklist-categoria-header {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--fuente-condensada); font-weight: 600; font-size: 13px;
    color: var(--color-primario); text-transform: uppercase; letter-spacing: 0.03em;
    padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1px solid var(--borde);
  }
  .checklist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px; border-bottom: 1px solid #F0F2F4;
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item .ci-nombre { flex: 1; min-width: 0; }
  .checklist-item .ci-condicion { font-size: 11.5px; color: var(--texto-tenue); font-style: italic; }
  .checklist-item .ci-acciones { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .barra-progreso { height: 6px; border-radius: 4px; background: var(--estado-neutro-bg); overflow: hidden; }
  .barra-progreso-relleno { height: 100%; background: var(--estado-ok); transition: width 0.2s ease; }

  /* ── Bloques de datos de solo lectura (ficha de caso) ─────────── */
  .grupo-datos { margin-bottom: 26px; }
  .grupo-datos:last-child { margin-bottom: 0; }

  .bloque-header {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--fuente-condensada); font-weight: 600; font-size: 12.5px;
    color: var(--color-primario); text-transform: uppercase; letter-spacing: 0.04em;
    padding-bottom: 8px; margin-bottom: 15px; border-bottom: 1px solid var(--borde);
  }
  .bloque-header .bh-icono {
    width: 22px; height: 22px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--color-acento-suave); color: var(--color-acento);
    border-radius: 6px;
  }
  .bloque-header .bh-icono svg { width: 13px; height: 13px; }

  .grid-datos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 22px; }
  @media (max-width: 900px) { .grid-datos { grid-template-columns: repeat(2, 1fr); } }

  .dato-item { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .dato-item .di-label { font-size: 10.5px; font-weight: 600; color: var(--texto-tenue); text-transform: uppercase; letter-spacing: 0.04em; }
  .dato-item .di-valor { font-size: 13.5px; color: var(--texto); font-weight: 500; overflow-wrap: break-word; }
  .dato-item .di-valor.vacio { color: var(--texto-tenue); font-weight: 400; font-style: italic; }

  .bloque-narrativo {
    background: var(--bg); border: 1px solid var(--borde); border-left: 3px solid var(--color-acento);
    border-radius: 0 var(--radio-chico) var(--radio-chico) 0; padding: 14px 16px;
  }
  .bloque-narrativo p { font-size: 13.5px; line-height: 1.7; color: var(--texto); }
  .bloque-narrativo.vacio p { color: var(--texto-tenue); font-style: italic; }
  .bloque-narrativo.vacio { border-left-color: var(--borde); }

  .tags-causa { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag-causa {
    display: inline-flex; align-items: center; padding: 4px 11px; border-radius: 5px;
    font-size: 11.5px; font-weight: 600;
  }
  .tag-causa.tg-grupo { background: var(--color-primario); color: #fff; }
  .tag-causa.tg-categoria { background: var(--color-acento-suave); color: var(--color-acento); }

  .vacio {
    text-align: center; padding: 48px 20px; color: var(--texto-tenue);
  }

  .modal-fondo {
    position: fixed; inset: 0; background: rgba(24, 36, 84, 0.35);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--superficie); border-radius: var(--radio); box-shadow: var(--sombra-flotante);
    width: 480px; max-width: 92vw; max-height: 88vh; overflow-y: auto; padding: 22px 24px;
  }

  .toast-contenedor { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--color-primario); color: #fff; padding: 12px 18px; border-radius: var(--radio-chico);
    box-shadow: var(--sombra-flotante); font-size: 13px; max-width: 340px; animation: aparecer 0.15s ease;
  }
  .toast.error { background: var(--estado-critico); }
  .toast.exito { background: var(--estado-ok); }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: girar 0.7s linear infinite; display: inline-block;
  }
  @keyframes girar { to { transform: rotate(360deg); } }

  .filtros-barra { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filtros-barra input, .filtros-barra select {
    padding: 7px 10px; border: 1px solid var(--borde); border-radius: var(--radio-chico); background: var(--superficie);
  }

  .zona-carga {
    border: 1.5px dashed var(--borde); border-radius: var(--radio);
    padding: 20px; text-align: center; color: var(--texto-secundario); font-size: 13px;
    cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease;
  }
  .zona-carga:hover { border-color: var(--color-acento); background: var(--color-acento-suave); }

  .badge-version { font-family: var(--fuente-mono); font-size: 11px; color: var(--texto-tenue); }

  /* ── Pantalla de acceso (login / setup / identificación) ─────── */
  .pantalla-acceso {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--color-primario); padding: 20px;
  }
  .tarjeta-acceso {
    background: var(--superficie); border-radius: var(--radio); box-shadow: var(--sombra-flotante);
    width: 420px; max-width: 100%; padding: 32px 30px;
  }
  .tarjeta-acceso h1 { font-size: 19px; margin-bottom: 6px; }
  .tarjeta-acceso p.subt { color: var(--texto-secundario); font-size: 13px; margin-bottom: 22px; }
  .tarjeta-acceso .btn { width: 100%; justify-content: center; padding: 11px; font-size: 13.5px; margin-bottom: 8px; }
  .lista-usuarios-acceso { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; margin-bottom: 14px; }
  .item-usuario-acceso {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--borde); border-radius: var(--radio-chico);
    cursor: pointer; transition: border-color .12s ease, background .12s ease;
  }
  .item-usuario-acceso:hover { border-color: var(--color-acento); background: var(--color-acento-suave); }
  .item-usuario-acceso .iu-nombre { font-weight: 600; font-size: 13px; }
  .item-usuario-acceso .iu-email { font-size: 11.5px; color: var(--texto-tenue); }
  .caja-ayuda { background: var(--bg); border: 1px solid var(--borde); border-radius: var(--radio-chico); padding: 12px 14px; font-size: 12px; color: var(--texto-secundario); margin-top: 14px; line-height: 1.6; }
  .caja-ayuda code { background: var(--estado-neutro-bg); padding: 1px 5px; border-radius: 3px; font-family: var(--fuente-mono); }
  .caja-id { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--borde); border-radius: var(--radio-chico); padding: 8px 10px; margin-bottom: 8px; }
  .caja-id code { flex: 1; font-family: var(--fuente-mono); font-size: 12px; overflow-x: auto; white-space: nowrap; }
</style>
</head>
<body>
  <div id="pantalla-acceso" class="pantalla-acceso">
    <div class="tarjeta-acceso" id="tarjeta-acceso"><!-- se pinta por JS: identificación --></div>
  </div>

  <div id="app" style="display:none;">
    <aside id="sidebar">
      <div class="marca" id="sidebar-marca"></div>
      <nav id="sidebar-nav"></nav>
      <div class="usuario-actual" id="sidebar-usuario"></div>
    </aside>

    <div id="main">
      <div id="topbar">
        <div id="topbar-breadcrumb"></div>
        <h1 id="topbar-titulo">Cargando…</h1>
      </div>
      <div id="contenido">
        <div class="vacio"><span class="spinner" style="border-top-color:var(--color-primario); border-color:var(--borde);"></span> Cargando sistema…</div>
      </div>
    </div>
  </div>

  <div class="toast-contenedor" id="toast-contenedor"></div>

  <!-- ── JavaScript.html ── -->
  <script>
  /* =====================================================================
     Control de Accidentes SST — lógica de cliente
     Todo el estado vive en memoria (variable `state`) y se repinta desde
     cero en cada navegación — no hay framework, solo funciones que arman
     HTML con template literals y lo inyectan en #contenido.
     ===================================================================== */

  var state = {
    usuario: null,
    config: {},
    vista: 'dashboard',
    casos: [],
    filtrosCasos: { estado: '', cliente: '', gravedad: '', texto: '' },
    casoActual: null,      // detalle completo del caso abierto (caso+medidas+documentos+historial)
    tabCasoActual: 'datos',
    catalogo: [],
    diatPendiente: null,   // { base64, mimeType, nombre } — DIAT usada al crear el caso
    diepPendiente: null,   // idem, para Enfermedad Profesional (sin OCR)
    ocrPendiente: null,    // { base64, mimeType, nombre } — informe de investigación, se usa al complementar un caso ya existente
    investigacionPendiente: null, // { archivo, campos } — mientras se revisa el modal de "Completar con investigación"
    modoAdministrador: false      // se activa con la clave de administrador, dura la sesión (se pierde al recargar)
  };

  // Modelo de permisos binario: casi todo está permitido para cualquiera
  // que abrió la app (crear/editar casos, medidas, licencias, documentos,
  // exportar, importar nómina). Solo estas dos acciones — las de impacto
  // más amplio o irreversible — exigen tener el modo administrador activo.
  var ACCIONES_SOLO_ADMIN = ['eliminar_caso', 'gestionar_catalogo'];
  function puede(accion) {
    if (ACCIONES_SOLO_ADMIN.indexOf(accion) === -1) return true;
    return !!state.modoAdministrador;
  }

  // ── Modo administrador (clave local, no es un usuario/rol) ──────────
  // Pensado para "solo dos personas usan esto": en vez de mantener roles
  // finos, cualquiera que sepa la clave puede activar el modo y hacer
  // cambios críticos (catálogo, eliminar casos, etc.) durante esa sesión.
  // La clave se guarda solo en este navegador (localStorage), con un hash
  // simple — esto NO es seguridad real, es un cerrojo simple para evitar
  // cambios accidentales, tal como se pidió.

  function hashSimple_(texto) {
    var hash = 0;
    for (var i = 0; i < texto.length; i++) { hash = ((hash << 5) - hash + texto.charCodeAt(i)) | 0; }
    return 'h' + hash + '_' + texto.length;
  }

  function activarModoAdmin_() {
    var hashGuardado = localStorage.getItem('sst_clave_admin_hash');
    if (!hashGuardado) return configurarClaveAdminPorPrimeraVez_();

    var intento = prompt('Ingresa la clave de administrador:');
    if (intento === null) return;
    if (hashSimple_(intento) === hashGuardado) {
      state.modoAdministrador = true;
      mostrarToast('Modo administrador activado.', 'exito');
      pintarShell();
      navegarA(state.vista, state.casoActual ? state.casoActual.caso.ID_Caso : undefined);
    } else {
      mostrarToast('Clave incorrecta.', 'error');
    }
  }

  function configurarClaveAdminPorPrimeraVez_() {
    var clave1 = prompt('Todavía no has definido una clave de administrador. Escribe la que quieras usar:');
    if (!clave1) return;
    var clave2 = prompt('Repite la clave para confirmarla:');
    if (clave1 !== clave2) { mostrarToast('Las claves no coinciden — inténtalo de nuevo.', 'error'); return; }
    localStorage.setItem('sst_clave_admin_hash', hashSimple_(clave1));
    state.modoAdministrador = true;
    mostrarToast('Clave creada y modo administrador activado.', 'exito');
    pintarShell();
    navegarA(state.vista, state.casoActual ? state.casoActual.caso.ID_Caso : undefined);
  }

  function cambiarClaveAdmin_() {
    var hashGuardado = localStorage.getItem('sst_clave_admin_hash');
    if (hashGuardado) {
      var actual = prompt('Ingresa la clave actual de administrador:');
      if (actual === null) return;
      if (hashSimple_(actual) !== hashGuardado) { mostrarToast('Clave actual incorrecta.', 'error'); return; }
    }
    var nueva1 = prompt('Escribe la nueva clave:');
    if (!nueva1) return;
    var nueva2 = prompt('Repite la nueva clave para confirmarla:');
    if (nueva1 !== nueva2) { mostrarToast('Las claves no coinciden — inténtalo de nuevo.', 'error'); return; }
    localStorage.setItem('sst_clave_admin_hash', hashSimple_(nueva1));
    mostrarToast('Clave de administrador actualizada.', 'exito');
  }

  function salirModoAdmin_() {
    state.modoAdministrador = false;
    mostrarToast('Saliste del modo administrador.', 'exito');
    pintarShell();
    navegarA(state.vista, state.casoActual ? state.casoActual.caso.ID_Caso : undefined);
  }

  var REGIONES_CHILE = [
    'Arica y Parinacota', 'Tarapacá', 'Antofagasta', 'Atacama', 'Coquimbo',
    'Valparaíso', 'Metropolitana', "O'Higgins", 'Maule', 'Ñuble', 'Biobío',
    'La Araucanía', 'Los Ríos', 'Los Lagos', 'Aysén', 'Magallanes'
  ];
  var CLIENTES_SUGERIDOS = ['CLARO', 'ENTEL', 'INFRACO', 'ONNET', 'VTR'];
  var SUCURSALES_SUGERIDAS = ['Santiago', 'Rancagua', 'Concepción', 'La Serena', 'Antofagasta', 'Valparaíso'];

  // ── Arranque ─────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', function () {
    if (!CONFIG.CLIENT_ID || CONFIG.CLIENT_ID.indexOf('PEGA_AQUI') === 0) {
      return mostrarPantallaConfigPendiente_();
    }
    initGis_();

    var emailRecordado = localStorage.getItem('sst_email');
    if (emailRecordado) {
      // Intenta reconectar sin pedir clic — si la sesión de Google ya no es
      // válida, cae de vuelta a la pantalla de login normal.
      reautenticarSilencioso_().then(onLoginExitoso_).catch(mostrarPantallaLogin_);
    } else {
      mostrarPantallaLogin_();
    }
  });

  function pintarShell() {
    var logo = state.config.LOGO_URL
      ? '<img src="' + state.config.LOGO_URL + '" alt="logo">'
      : '<div style="width:32px;height:32px;border-radius:4px;background:var(--color-acento);"></div>';

    document.getElementById('sidebar-marca').innerHTML =
      logo +
      '<div class="marca-textos">' +
        '<span class="marca-empresa">' + escapeHtml(state.config.NOMBRE_EMPRESA || '') + '</span>' +
        '<span class="marca-sistema">' + escapeHtml(state.config.NOMBRE_SISTEMA || 'Control de Accidentes SST') + '</span>' +
      '</div>';

    var nav = [
      { v: 'dashboard', icono: '&#9632;', label: 'Dashboard' },
      { v: 'casos', icono: '&#9776;', label: 'Casos' }
    ];
    if (puede('crear_caso')) nav.push({ v: 'nuevo-caso', icono: '&#43;', label: 'Nuevo caso' });
    nav.push({ v: 'catalogo', icono: '&#128193;', label: 'Catálogo de documentos' });
    nav.push({ v: 'importar-nomina', icono: '&#8659;', label: 'Importar nómina Mutual' });
    if (state.modoAdministrador) nav.push({ v: 'restablecer-datos', icono: '&#9888;', label: 'Restablecer datos' });

    document.getElementById('sidebar-nav').innerHTML = nav.map(function (n) {
      return '<div class="nav-item" data-vista="' + n.v + '" onclick="navegarA(\'' + n.v + '\')">' +
        '<span class="icono">' + n.icono + '</span>' + n.label + '</div>';
    }).join('');

    document.getElementById('sidebar-usuario').innerHTML =
      '<span class="u-nombre">' + escapeHtml(state.usuario.nombre) + '</span>' +
      '<div class="u-rol">' + (state.modoAdministrador ? '<span style="color:#FCCC00;">Modo administrador activo</span>' : 'Sesión normal') + '</div>' +
      '<div style="margin-top:8px; display:flex; flex-direction:column; gap:4px;">' +
        '<a href="#" onclick="cambiarNombreUsuario_(); return false;" style="color:rgba(255,255,255,0.55); font-size:11px;">Cambiar nombre</a>' +
        (state.modoAdministrador
          ? '<a href="#" onclick="salirModoAdmin_(); return false;" style="color:rgba(255,255,255,0.55); font-size:11px;">Salir de modo administrador</a>' +
            '<a href="#" onclick="cambiarClaveAdmin_(); return false;" style="color:rgba(255,255,255,0.55); font-size:11px;">Cambiar clave de administrador</a>'
          : '<a href="#" onclick="activarModoAdmin_(); return false;" style="color:rgba(255,255,255,0.55); font-size:11px;">Activar modo administrador</a>') +
      '</div>';
  }

  // ── Navegación ─────────────────────────────────────────────────────────

  function navegarA(vista, param) {
    state.vista = vista;
    document.querySelectorAll('.nav-item').forEach(function (el) {
      el.classList.toggle('activo', el.getAttribute('data-vista') === vista);
    });

    if (vista === 'dashboard') return cargarDashboard();
    if (vista === 'casos') return cargarCasos();
    if (vista === 'nuevo-caso') return renderNuevoCaso();
    if (vista === 'caso-detalle') return cargarCasoDetalle(param);
    if (vista === 'catalogo') return cargarCatalogo();
    if (vista === 'importar-nomina') return cargarImportarNomina_();
    if (vista === 'restablecer-datos') return cargarRestablecerDatos_();
  }

  function elContenido() { return document.getElementById('contenido'); }
  function elTopbarTitulo(t) { document.getElementById('topbar-titulo').textContent = t; }

  // Pinta la ruta de navegación arriba del título — pasos = [{label, vista, param}].
  // El último paso nunca es un link (es "donde estás"); los anteriores sí.
  function actualizarBreadcrumb_(pasos) {
    var cont = document.getElementById('topbar-breadcrumb');
    if (!cont) return;
    if (!pasos || pasos.length === 0) { cont.innerHTML = ''; return; }
    cont.innerHTML = pasos.map(function (p, i) {
      if (i === pasos.length - 1 || !p.vista) return '<span class="breadcrumb-actual">' + escapeHtml(p.label) + '</span>';
      var onclick = "navegarA('" + p.vista + "'" + (p.param ? ",'" + p.param + "'" : '') + "); return false;";
      return '<a href="#" onclick="' + onclick + '">' + escapeHtml(p.label) + '</a>';
    }).join(' <span class="breadcrumb-sep">/</span> ');
  }

  // ── Utilidades de llamada a los servicios (REST directo a Sheets/Drive) ─

  function llamar(nombreFuncion) {
    var args = Array.prototype.slice.call(arguments, 1);
    var fn = SERVICIOS[nombreFuncion];
    if (!fn) return Promise.reject(new Error('Servicio no implementado: ' + nombreFuncion));
    return Promise.resolve().then(function () { return fn.apply(null, args); });
  }

  function mostrarToast(mensaje, tipo) {
    var cont = document.getElementById('toast-contenedor');
    var el = document.createElement('div');
    el.className = 'toast' + (tipo ? ' ' + tipo : '');
    el.textContent = mensaje;
    cont.appendChild(el);
    setTimeout(function () { el.remove(); }, 4500);
  }

  function mostrarError(err) {
    mostrarToast(typeof err === 'string' ? err : (err && err.message) || 'Ocurrió un error inesperado.', 'error');
  }

  function conSpinner(boton, promesa) {
    var textoOriginal = boton.innerHTML;
    boton.disabled = true;
    boton.innerHTML = '<span class="spinner"></span> Procesando…';
    return promesa.finally(function () {
      boton.disabled = false;
      boton.innerHTML = textoOriginal;
    });
  }

  function escapeHtml(t) {
    if (t === null || t === undefined) return '';
    return String(t).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function leerArchivoBase64(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var base64 = reader.result.split(',')[1];
        resolve({ base64: base64, mimeType: file.type, nombre: file.name });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function confirmarAccion(mensaje) {
    return new Promise(function (resolve) {
      var fondo = document.createElement('div');
      fondo.className = 'modal-fondo';
      fondo.innerHTML =
        '<div class="modal" style="width:380px;">' +
          '<h2>Confirmar</h2><p>' + escapeHtml(mensaje) + '</p>' +
          '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
            '<button class="btn btn-secundario" id="conf-no">Cancelar</button>' +
            '<button class="btn btn-primario" id="conf-si">Confirmar</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(fondo);
      fondo.querySelector('#conf-no').onclick = function () { fondo.remove(); resolve(false); };
      fondo.querySelector('#conf-si').onclick = function () { fondo.remove(); resolve(true); };
    });
  }

  function cerrarModal() {
    var m = document.querySelector('.modal-fondo');
    if (m) m.remove();
  }

  function pillEstadoCaso(estado) {
    var mapa = {
      abierto: ['pill-info', 'Abierto'],
      en_investigacion: ['pill-alerta', 'En investigación'],
      cerrado: ['pill-ok', 'Cerrado']
    };
    var v = mapa[estado] || ['pill-neutro', estado];
    return '<span class="pill ' + v[0] + '">' + v[1] + '</span>';
  }

  function pillGravedad(g) {
    var mapa = {
      LEVE: ['pill-neutro', 'Leve'],
      IAP: ['pill-info', 'Incidente de Alto Potencial'],
      GRAVE: ['pill-alerta', 'Grave · MINSAL-NT142'],
      FATAL: ['pill-critico', 'Fatal']
    };
    var v = mapa[g] || ['pill-neutro', g || '—'];
    return '<span class="pill ' + v[0] + '">' + v[1] + '</span>';
  }

  function pillEstadoMedida(estado) {
    var mapa = {
      abierta: ['pill-info', 'Abierta'],
      en_curso: ['pill-alerta', 'En curso'],
      cerrada: ['pill-ok', 'Cerrada'],
      vencida: ['pill-critico', 'Vencida']
    };
    var v = mapa[estado] || ['pill-neutro', estado];
    return '<span class="pill ' + v[0] + '">' + v[1] + '</span>';

  function pillEstadoDoc(estado) {
    var mapa = {
      pendiente: ['pill-alerta', 'Pendiente'],
      cargado: ['pill-ok', 'Cargado'],
      no_aplica: ['pill-neutro', 'No aplica']
    };
    var v = mapa[estado] || ['pill-neutro', estado];
    return '<span class="pill ' + v[0] + '">' + v[1] + '</span>';
  }
</script>

  function tuplaACatalogo_(t) {

      Aplica_Solo_Grave_NT142: t[4], Aplica_Solo_Fatal: t[5], Aplica_Solo_Leve: t[6],

  // Sheets devuelve todo como texto — "TRUE"/"FALSE", no booleanos de JS.
  function esVerdadero_(v) { return v === true || v === 'TRUE' || v === 'sí' || v === 'Sí' || v === 'VERDADERO'; }
  function hoyISO_() { return new Date().toISOString().substring(0, 10); }
  function sumarDias_(fechaISO, dias) {
    var d = new Date(fechaISO); d.setDate(d.getDate() + dias);

  function formatearFechaHoraISO_(d) { return d.toISOString().replace('T', ' ').substring(0, 19); }

  // ── Generación del checklist de documentos para un caso, según catálogo + gravedad ──
  // Ahora es asíncrona: el catálogo se lee en vivo desde la hoja Catalogo_Documentos.
  function generarChecklist_(idCaso, gravedad, tipoSiniestro) {
    var esLeve = (gravedad === GRAVEDAD.LEVE || gravedad === GRAVEDAD.IAP);
    var esGraveOFatal = (gravedad === GRAVEDAD.GRAVE || gravedad === GRAVEDAD.FATAL);
    var esEnfermedad = (tipoSiniestro === 'Enfermedad Profesional');
    return sheetLeerObjetos_('Catalogo_Documentos').then(function (catalogo) {
      var aplicables = catalogo.filter(function (it) {
        if (!esVerdadero_(it.Activo)) return false;
        if (it.Tipo_Siniestro_Aplicable === 'accidente' && esEnfermedad) return false;
        if (it.Tipo_Siniestro_Aplicable === 'enfermedad' && !esEnfermedad) return false;
        if (esVerdadero_(it.Aplica_Siempre)) return true;
        if (esGraveOFatal && esVerdadero_(it.Aplica_Solo_Grave_NT142)) return true;
        if (gravedad === GRAVEDAD.FATAL && esVerdadero_(it.Aplica_Solo_Fatal)) return true;
        if (esLeve && esVerdadero_(it.Aplica_Solo_Leve)) return true;
        return false;
      });
      return aplicables.map(function (it, i) {
        return {
          ID_Registro: 'DOC-' + idCaso + '-' + String(i + 1).padStart(2, '0'),
          ID_Caso: idCaso, ID_Item_Catalogo: it.ID_Item, Categoria: it.Categoria, Nombre_Documento: it.Nombre_Documento,
          Condicion_Adicional: it.Condicion_Adicional || '', Carpeta_Drive_Id: '', Estado: ESTADO_DOCUMENTO.PENDIENTE,
          Version: 0, Drive_File_Id: '', URL_Drive: '', Nombre_Archivo: '', Fecha_Carga: '', Cargado_Por: '',
          Es_Personalizado: false
        };
      });
    });
  }

  SERVICIOS.crearEstructuraInicial_ = function () {
    var nombresHojas = Object.keys(ESQUEMA_HOJAS);

    // 1) Crea la planilla con las 7 hojas de un solo golpe.
    return apiFetch_('https://sheets.googleapis.com/v4/spreadsheets', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        properties: { title: 'SST - Control de Accidentes - Zener Austral' },
        sheets: nombresHojas.map(function (n) { return { properties: { title: n } }; })
      })
    }).then(function (r) { return r.json(); }).then(function (planilla) {
      var spreadsheetId = planilla.spreadsheetId;

      // 2) Prepara el encabezado de cada hoja.
      var escrituras = nombresHojas.map(function (n) { return { range: n + '!A1', values: [ESQUEMA_HOJAS[n]] }; });

      // 3) Prepara las filas del catálogo de documentos base (se siembra de una vez).
      var filasCatalogo = CATALOGO_BASE.map(tuplaACatalogo_).map(function (it) {
        return [it.ID_Item, it.Categoria, it.Nombre_Documento, it.Aplica_Siempre, it.Aplica_Solo_Grave_NT142,
          it.Aplica_Solo_Fatal, it.Aplica_Solo_Leve, it.Condicion_Adicional, it.Tipo_Siniestro_Aplicable, it.Activo];
      });
      escrituras.push({ range: 'Catalogo_Documentos!A2', values: filasCatalogo });

      // 4) Prepara la configuración inicial (incluye la clave de administrador vacía —
      //    se crea la primera vez que alguien usa "Activar modo administrador").
      escrituras.push({
        range: 'Configuracion!A2',
        values: [
          ['NOMBRE_EMPRESA', 'ZENER AUSTRAL LTDA.'], ['NOMBRE_SISTEMA', 'Control de Accidentes SST'],
          ['LOGO_URL', LOGO_ZENER_BASE64], ['COLOR_PRIMARIO', '#182454'], ['COLOR_ACENTO', '#4E6E8E'],
          ['VERSION_CATALOGO_ACTIVA', 'v1'], ['CLAVE_ADMIN_HASH', '']
        ]
      });

      // 5) Escribe todo eso (encabezados + catálogo + configuración) en un solo llamado.
      return apiFetch_(API_SHEETS + '/' + spreadsheetId + '/values:batchUpdate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: escrituras })
      }).then(function () {
        // 6) Crea la carpeta raíz en Drive — todas las carpetas de casos van a vivir adentro.
        return apiFetch_(API_DRIVE + '/files?fields=id,webViewLink', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: 'SST - Control de Accidentes', mimeType: 'application/vnd.google-apps.folder' })
        });
      }).then(function (r) { return r.json(); }).then(function (carpeta) {
        return {
          spreadsheetId: spreadsheetId,
          rootFolderId: carpeta.id,
          spreadsheetUrl: 'https://docs.google.com/spreadsheets/d/' + spreadsheetId + '/edit'
        };
      });
    });
  };

  SERVICIOS.obtenerConfiguracion = function () {
    return sheetLeerObjetos_('Configuracion').then(function (filas) {
      var config = {};
      filas.forEach(function (f) { config[f.Clave] = f.Valor; });
      return config;
    });
  };

  function registrarHistorial_(idReferencia, tipoReferencia, accion, detalle) {
    return sheetAppendObjeto_('Historial_Cambios', {
      Fecha_Hora: formatearFechaHoraISO_(new Date()), Usuario: state.usuario.email,
      ID_Referencia: idReferencia, Tipo_Referencia: tipoReferencia, Accion: accion, Detalle: detalle || ''
    });
  }

  // Como sheetAppendObjeto_, pero para varias filas de una vez en un solo
  // llamado — se usa para sembrar el checklist completo de un caso nuevo.
  function sheetAppendVariosObjetos_(nombreHoja, objetos) {
    if (objetos.length === 0) return Promise.resolve();
    return sheetHeaders_(nombreHoja).then(function (headers) {
      var filas = objetos.map(function (obj) { return headers.map(function (h) { return (obj[h] !== undefined && obj[h] !== null) ? obj[h] : ''; }); });
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja) +
        '!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return apiFetch_(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ values: filas }) });
    });
  }

  // sheetId numérico interno (distinto del ID de la planilla) que pide la
  // API para borrar filas — se cachea porque no cambia durante la sesión.
  var cacheSheetIds_ = null;
  function obtenerSheetIdPorNombre_(nombreHoja) {
    if (!cacheSheetIds_) {
      cacheSheetIds_ = apiFetch_(API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '?fields=sheets.properties')
        .then(function (r) { return r.json(); }).then(function (d) {
          var mapa = {};
          d.sheets.forEach(function (s) { mapa[s.properties.title] = s.properties.sheetId; });
          return mapa;
        });
    }
    return cacheSheetIds_.then(function (mapa) { return mapa[nombreHoja]; });
  }

  // Crea (o reutiliza si ya existe) la carpeta del caso dentro de la raíz,
  // con sus 8 subcarpetas fijas por categoría.
  function crearCarpetasCaso_(nombreCarpetaCaso) {
    return driveGetOrCrearCarpeta_(nombreCarpetaCaso, CONFIG.ROOT_FOLDER_ID).then(function (idCarpetaCaso) {
      return Promise.all(CATEGORIAS_CARPETAS.map(function (c) { return driveGetOrCrearCarpeta_(c.carpeta, idCarpetaCaso); }))
        .then(function (idsSubcarpetas) {
          var subcarpetas = {};
          CATEGORIAS_CARPETAS.forEach(function (c, i) { subcarpetas[c.categoria] = idsSubcarpetas[i]; });
          return { idCarpetaCaso: idCarpetaCaso, subcarpetas: subcarpetas };
        });
    });
  }

  function calcularEstadoMedida_(m) {
    if (m.Estado === ESTADO_MEDIDA.CERRADA) return ESTADO_MEDIDA.CERRADA;
    if (esFechaAnteriorAHoy_(m.Fecha_Compromiso)) return ESTADO_MEDIDA.VENCIDA;
    return m.Estado || ESTADO_MEDIDA.ABIERTA;
  }

  SERVICIOS.listarCasos = function (filtros) {
    filtros = filtros || {};
    return Promise.all([sheetLeerObjetos_('Casos'), sheetLeerObjetos_('Licencias_Medicas')]).then(function (res) {
      var casos = res[0], licencias = res[1];
      var out = casos.filter(function (c) {
        if (filtros.estado && c.Estado_Caso !== filtros.estado) return false;
        if (filtros.cliente && c.Cliente !== filtros.cliente) return false;
        if (filtros.gravedad && c.Gravedad !== filtros.gravedad) return false;
        if (filtros.texto) {
          var t = filtros.texto.toLowerCase();
          if (String(c.Nombre_Trabajador).toLowerCase().indexOf(t) === -1 &&
              String(c.RUT_Trabajador).toLowerCase().indexOf(t) === -1 &&
              String(c.ID_Caso).toLowerCase().indexOf(t) === -1) return false;
        }
        return true;
      }).sort(function (a, b) { return new Date(b.Fecha_Registro) - new Date(a.Fecha_Registro); });
      out.forEach(function (c) {
        c.Dias_Licencia_Total = licencias.filter(function (l) { return l.ID_Caso === c.ID_Caso; })
          .reduce(function (s, l) { return s + (Number(l.Dias) || 0); }, 0);
      });
      return out;
    });
  };

  // Crea el caso: genera el ID, arma la carpeta en Drive con sus 8
  // subcarpetas, escribe la fila del caso, y siembra su checklist completo.
  SERVICIOS.crearCaso = function (datos) {
    return generarIdCaso_().then(function (idCaso) {
      var nombreCarpeta = String(datos.Nombre_Trabajador || 'Sin_Nombre').replace(/[\\\/:*?"<>|]/g, '').trim() +
        '_' + String(datos.Numero_Siniestro_Mutual || 'SN');

      return crearCarpetasCaso_(nombreCarpeta).then(function (carpetas) {
        var caso = Object.assign({}, datos, {
          ID_Caso: idCaso, Fecha_Registro: formatearFechaHoraISO_(new Date()), Estado_Caso: ESTADO_CASO.ABIERTO,
          Fecha_Siniestro: datos.Fecha_Siniestro || hoyISO_(),
          ID_Carpeta_Drive: carpetas.idCarpetaCaso, URL_Carpeta_Drive: 'https://drive.google.com/drive/folders/' + carpetas.idCarpetaCaso,
          Registrado_Por: state.usuario.email, Fecha_Cierre: '', Observaciones: datos.Observaciones || ''
        });

        return sheetAppendObjeto_('Casos', caso).then(function () {
          return generarChecklist_(idCaso, datos.Gravedad, datos.Tipo_Siniestro);
        }).then(function (checklist) {
          checklist.forEach(function (item) { item.Carpeta_Drive_Id = carpetas.subcarpetas[item.Categoria] || carpetas.idCarpetaCaso; });
          return sheetAppendVariosObjetos_('Documentos_Caso', checklist);
        }).then(function () {
          return registrarHistorial_(idCaso, 'Caso', 'creacion', 'Gravedad: ' + datos.Gravedad);
        }).then(function () {
          return SERVICIOS.obtenerCaso(idCaso);
        });
      });
    });
  };

  SERVICIOS.obtenerCaso = function (idCaso) {
    return buscarFilaPor_('Casos', 'ID_Caso', idCaso).then(function (caso) {
      if (!caso) throw new Error('Caso ' + idCaso + ' no encontrado.');
      return Promise.all([
        SERVICIOS.listarMedidasPorCaso(idCaso), SERVICIOS.listarChecklistPorCaso(idCaso),
        SERVICIOS.obtenerHistorialPorCaso_(idCaso), SERVICIOS.listarLicenciasPorCaso(idCaso)
      ]).then(function (res) { return { caso: caso, medidas: res[0], documentos: res[1], historial: res[2], licencias: res[3] }; });
    });
  };

  // Completa un caso ya creado (típicamente desde DIAT/DIEP) con los datos del
  // informe de investigación. Solo llena campos que estaban vacíos — nunca pisa
  // lo que ya venía cargado — excepto Causa_Raiz/Grupo_Causa/Categoria_Causa,
  // que son exclusivos de la investigación y se revisan en pantalla antes de aplicar.
  SERVICIOS.completarCasoConInvestigacion = function (idCaso, campos) {
    return buscarFilaPor_('Casos', 'ID_Caso', idCaso).then(function (caso) {
      if (!caso) throw new Error('Caso ' + idCaso + ' no encontrado.');
      var SIEMPRE_SOBRESCRIBIBLES = ['Causa_Raiz', 'Grupo_Causa', 'Categoria_Causa'];
      var cambios = {}, aplicados = [];
      Object.keys(campos).forEach(function (campo) {
        if (!campos[campo]) return;
        if (SIEMPRE_SOBRESCRIBIBLES.indexOf(campo) !== -1 || !caso[campo]) { cambios[campo] = campos[campo]; aplicados.push(campo); }
      });
      return sheetActualizarPorId_('Casos', 'ID_Caso', idCaso, cambios)
        .then(function () { return registrarHistorial_(idCaso, 'Caso', 'edicion', 'Completado con informe de investigación: ' + aplicados.join(', ')); })
        .then(function () { return SERVICIOS.obtenerCaso(idCaso); });
    });
  };

  // Agrega al checklist los ítems del catálogo que correspondan a la nueva
  // gravedad/tipo de siniestro y que todavía no estén en el caso. Nunca
  // borra ni toca los ítems existentes, aunque ya no correspondan — pueden
  // tener documentos cargados y perderlos sería peor que dejar uno de más.
  function reconciliarChecklistPorCambioGravedad_(idCaso, gravedad, tipoSiniestro) {
    return Promise.all([SERVICIOS.listarChecklistPorCaso(idCaso), generarChecklist_(idCaso, gravedad, tipoSiniestro)])
      .then(function (res) {
        var existente = res[0], candidatos = res[1];
        var idsExistentes = existente.map(function (d) { return d.ID_Item_Catalogo; }).filter(Boolean);
        var nuevos = candidatos.filter(function (d) { return d.ID_Item_Catalogo && idsExistentes.indexOf(d.ID_Item_Catalogo) === -1; });
        if (nuevos.length === 0) return [];
        var contador = existente.length + 1;
        nuevos.forEach(function (d) { d.ID_Registro = 'DOC-' + idCaso + '-' + String(contador++).padStart(2, '0'); });
        return sheetAppendVariosObjetos_('Documentos_Caso', nuevos).then(function () { return nuevos; });
      });
  }

  // Edición directa de un caso (pantalla "Editar datos"). A diferencia de
  // completarCasoConInvestigacion, aquí SÍ se pisa lo que había antes en
  // cada campo recibido — es una edición explícita, no un autocompletado.
  SERVICIOS.actualizarCaso = function (idCaso, cambios) {
    return buscarFilaPor_('Casos', 'ID_Caso', idCaso).then(function (caso) {
      if (!caso) throw new Error('Caso ' + idCaso + ' no encontrado.');
      var gravedadCambio = cambios.Gravedad && cambios.Gravedad !== caso.Gravedad;
      var tipoCambio = cambios.Tipo_Siniestro && cambios.Tipo_Siniestro !== caso.Tipo_Siniestro;

      return sheetActualizarPorId_('Casos', 'ID_Caso', idCaso, cambios).then(function () {
        if (!(gravedadCambio || tipoCambio)) {
          return registrarHistorial_(idCaso, 'Caso', 'edicion', 'Datos del caso editados manualmente').then(function () { return 0; });
        }
        var nuevaGravedad = cambios.Gravedad || caso.Gravedad;
        var nuevoTipo = cambios.Tipo_Siniestro || caso.Tipo_Siniestro;
        return reconciliarChecklistPorCambioGravedad_(idCaso, nuevaGravedad, nuevoTipo).then(function (nuevos) {
          var detalle = 'Datos del caso editados manualmente. Gravedad/tipo de siniestro cambiado' +
            (nuevos.length > 0 ? ' — se agregaron ' + nuevos.length + ' documento(s) nuevo(s) al checklist.' : ' — no hubo documentos nuevos que agregar.');
          return registrarHistorial_(idCaso, 'Caso', 'edicion', detalle).then(function () { return nuevos.length; });
        });
      }).then(function (docsAgregados) {
        return SERVICIOS.obtenerCaso(idCaso).then(function (data) { data.docsAgregados = docsAgregados; return data; });
      });
    });
  };

  SERVICIOS.obtenerHistorialPorCaso_ = function (idCaso) {
    return Promise.all([
      sheetLeerObjetos_('Historial_Cambios'), sheetLeerObjetos_('Medidas_Correctivas'),
      sheetLeerObjetos_('Documentos_Caso'), sheetLeerObjetos_('Licencias_Medicas')
    ]).then(function (res) {
      var historial = res[0], medidas = res[1], documentos = res[2], licencias = res[3];
      var idsMedidas = medidas.filter(function (m) { return m.ID_Caso === idCaso; }).map(function (m) { return m.ID_Medida; });
      var idsDocs = documentos.filter(function (d) { return d.ID_Caso === idCaso; }).map(function (d) { return d.ID_Registro; });
      var idsLicencias = licencias.filter(function (l) { return l.ID_Caso === idCaso; }).map(function (l) { return l.ID_Licencia; });
      var relevantes = [idCaso].concat(idsMedidas).concat(idsDocs).concat(idsLicencias);
      return historial.filter(function (h) { return relevantes.indexOf(h.ID_Referencia) !== -1; })
        .sort(function (a, b) { return new Date(b.Fecha_Hora) - new Date(a.Fecha_Hora); });
    });
  };

  SERVICIOS.cerrarCaso = function (idCaso) {
    return sheetLeerObjetos_('Documentos_Caso').then(function (documentos) {
      var pendientes = documentos.filter(function (d) { return d.ID_Caso === idCaso && d.Estado === ESTADO_DOCUMENTO.PENDIENTE; });
      if (pendientes.length > 0) {
        var nombres = pendientes.slice(0, 4).map(function (d) { return d.Nombre_Documento; }).join('; ');
        var extra = pendientes.length > 4 ? ' y ' + (pendientes.length - 4) + ' más' : '';
        throw new Error('No se puede cerrar: quedan ' + pendientes.length + ' documento(s) pendientes en el checklist (' + nombres + extra + '). Cárgalos o márcalos como "No aplica" antes de cerrar el caso.');
      }
      return sheetActualizarPorId_('Casos', 'ID_Caso', idCaso, { Estado_Caso: ESTADO_CASO.CERRADO, Fecha_Cierre: hoyISO_() });
    }).then(function () {
      return registrarHistorial_(idCaso, 'Caso', 'cambio_estado', 'Caso cerrado');
    }).then(function () { return SERVICIOS.obtenerCaso(idCaso); });
  };

  SERVICIOS.reabrirCaso = function (idCaso) {
    return sheetActualizarPorId_('Casos', 'ID_Caso', idCaso, { Estado_Caso: ESTADO_CASO.EN_INVESTIGACION, Fecha_Cierre: '' })
      .then(function () { return registrarHistorial_(idCaso, 'Caso', 'cambio_estado', 'Caso reabierto'); })
      .then(function () { return SERVICIOS.obtenerCaso(idCaso); });
  };

  // OJO: borra solo la fila del caso en la hoja Casos. Las filas de medidas,
  // licencias y documentos de ese caso quedan huérfanas en sus hojas (no se
  // cascadea el borrado) — es un límite conocido de este paso del porte,
  // se resuelve si hace falta más adelante. La carpeta de Drive no se toca.
  SERVICIOS.eliminarCaso = function (idCaso) {
    return Promise.all([sheetHeaders_('Casos'), sheetGetAll_('Casos'), obtenerSheetIdPorNombre_('Casos')]).then(function (res) {
      var headers = res[0], filas = res[1], sheetId = res[2];
      var idxCol = headers.indexOf('ID_Caso');
      var filaIdx = -1;
      for (var i = 1; i < filas.length; i++) { if (String(filas[i][idxCol]) === String(idCaso)) { filaIdx = i; break; } }
      if (filaIdx === -1) throw new Error('Caso no encontrado.');
      return apiFetch_(API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + ':batchUpdate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requests: [{ deleteDimension: { range: { sheetId: sheetId, dimension: 'ROWS', startIndex: filaIdx, endIndex: filaIdx + 1 } } }] })
      });
    }).then(function () {
      return registrarHistorial_(idCaso, 'Caso', 'eliminacion', 'Caso eliminado del sistema (la carpeta de Drive no se borra)');
    });
  };

  // Limpia todas las filas de datos de una hoja (deja el encabezado intacto).
  function sheetLimpiarDatos_(nombreHoja) {
    return apiFetch_(API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja + '!A2:ZZ') + ':clear', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({})
    });
  }

  // El historial mezcla referencias a casos/medidas/licencias/documentos con
  // otras (catálogo, sistema) — hay que conservar estas últimas al limpiar.
  function limpiarHistorialSelectivo_(tiposAEliminar) {
    return sheetLeerObjetos_('Historial_Cambios').then(function (filas) {
      var conservar = filas.filter(function (h) { return tiposAEliminar.indexOf(h.Tipo_Referencia) === -1; });
      return sheetLimpiarDatos_('Historial_Cambios').then(function () { return sheetAppendVariosObjetos_('Historial_Cambios', conservar); });
    });
  }

  // "Modo dios" — borra datos completos por tipo. Nunca se llama sin que la
  // UI haya forzado antes una descarga de respaldo (ver cargarRestablecerDatos_).
  // El catálogo, si se restablece, vuelve a los ítems de fábrica (v1) —
  // se pierden los ítems personalizados que se hayan agregado.
  SERVICIOS.restablecerDatos = function (opciones) {
    var pasos = [];
    if (opciones.casos) {
      pasos.push(sheetLimpiarDatos_('Casos'));
      pasos.push(sheetLimpiarDatos_('Medidas_Correctivas'));
      pasos.push(sheetLimpiarDatos_('Licencias_Medicas'));
      pasos.push(sheetLimpiarDatos_('Documentos_Caso'));
      pasos.push(limpiarHistorialSelectivo_(['Caso', 'Medida', 'Licencia', 'Documento']));
    }
    if (opciones.catalogo) {
      pasos.push(sheetLimpiarDatos_('Catalogo_Documentos').then(function () {
        var filasCatalogo = CATALOGO_BASE.map(tuplaACatalogo_).map(function (it) {
          return [it.ID_Item, it.Categoria, it.Nombre_Documento, it.Aplica_Siempre, it.Aplica_Solo_Grave_NT142,
            it.Aplica_Solo_Fatal, it.Aplica_Solo_Leve, it.Condicion_Adicional, it.Tipo_Siniestro_Aplicable, it.Activo];
        });
        return apiFetch_(API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent('Catalogo_Documentos!A2') +
          ':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ values: filasCatalogo })
        });
      }));
    }
    return Promise.all(pasos).then(function () {
      return registrarHistorial_('SISTEMA', 'Sistema', 'eliminacion',
        'Restablecimiento de datos ejecutado — ' +
        [opciones.casos ? 'casos y todo lo asociado' : null, opciones.catalogo ? 'catálogo de documentos' : null].filter(Boolean).join(' + '));
    });
  };

  SERVICIOS.listarMedidasPorCaso = function (idCaso) {
    return sheetLeerObjetos_('Medidas_Correctivas').then(function (todas) {
      return todas.filter(function (m) { return m.ID_Caso === idCaso; }).map(function (m) { m.Estado_Calculado = calcularEstadoMedida_(m); return m; });
    });
  };

  // Encuentra (o crea) la subcarpeta de una categoría dentro de la carpeta
  // del caso — se usa para subir evidencia de medidas y licencias al lugar
  // correcto en Drive.
  function obtenerSubcarpetaCaso_(idCaso, categoria) {
    return buscarFilaPor_('Casos', 'ID_Caso', idCaso).then(function (caso) {
      if (!caso || !caso.ID_Carpeta_Drive) throw new Error('El caso no tiene carpeta de Drive asociada.');
      var nombreCarpeta = (CATEGORIAS_CARPETAS.filter(function (c) { return c.categoria === categoria; })[0] || {}).carpeta || categoria;
      return driveGetOrCrearCarpeta_(nombreCarpeta, caso.ID_Carpeta_Drive);
    });
  }

  SERVICIOS.crearMedida = function (idCaso, datos) {
    return generarIdSecuencial_('MED', 'Medidas_Correctivas', 'ID_Medida').then(function (idMedida) {
      var medida = Object.assign({}, datos, {
        ID_Medida: idMedida, ID_Caso: idCaso, Estado: datos.Estado || ESTADO_MEDIDA.ABIERTA,
        Fecha_Registro: formatearFechaHoraISO_(new Date()), Registrado_Por: state.usuario.email
      });
      return sheetAppendObjeto_('Medidas_Correctivas', medida)
        .then(function () { return registrarHistorial_(idMedida, 'Medida', 'creacion', 'Medida creada para ' + idCaso); })
        .then(function () { return SERVICIOS.listarMedidasPorCaso(idCaso); });
    });
  };

  SERVICIOS.actualizarMedida = function (idMedida, cambios) {
    return buscarFilaPor_('Medidas_Correctivas', 'ID_Medida', idMedida).then(function (m) {
      if (!m) throw new Error('Medida no encontrada');
      if (cambios.Estado === ESTADO_MEDIDA.CERRADA && !cambios.Fecha_Cierre_Real) cambios.Fecha_Cierre_Real = hoyISO_();
      return sheetActualizarPorId_('Medidas_Correctivas', 'ID_Medida', idMedida, cambios)
        .then(function () { return registrarHistorial_(idMedida, 'Medida', 'edicion', JSON.stringify(cambios)); })
        .then(function () { return SERVICIOS.listarMedidasPorCaso(m.ID_Caso); });
    });
  };

  SERVICIOS.subirEvidenciaMedida = function (idMedida, base64Data, mimeType, nombreOriginal) {
    return buscarFilaPor_('Medidas_Correctivas', 'ID_Medida', idMedida).then(function (m) {
      if (!m) throw new Error('Medida no encontrada');
      return obtenerSubcarpetaCaso_(m.ID_Caso, 'Medidas_Correctivas').then(function (idCarpeta) {
        return driveSubirBase64_(idCarpeta, base64Data, mimeType, nombreOriginal || 'evidencia');
      }).then(function (archivo) {
        return sheetActualizarPorId_('Medidas_Correctivas', 'ID_Medida', idMedida, {
          Evidencia_URL: archivo.webViewLink || '', Evidencia_Nombre_Archivo: archivo.name || nombreOriginal || 'evidencia',
          Evidencia_Fecha_Carga: formatearFechaHoraISO_(new Date()), Evidencia_Cargado_Por: state.usuario.email
        });
      }).then(function () {
        return registrarHistorial_(idMedida, 'Medida', 'carga_documento', 'Evidencia adjuntada: ' + (nombreOriginal || 'evidencia'));
      }).then(function () { return SERVICIOS.listarMedidasPorCaso(m.ID_Caso); });
    });
  };

  // ── Licencias médicas (seguimiento por caso) ────────────────────────

  function calcularDiasEntre_(fechaInicio, fechaTermino) {
    if (!fechaInicio || !fechaTermino) return '';
    var d1 = new Date(fechaInicio), d2 = new Date(fechaTermino);
    var dias = Math.round((d2 - d1) / 86400000) + 1; // ambos días inclusive
    return dias > 0 ? dias : '';
  }

  // Si la licencia más reciente de un caso ya venció y no se registró ni una
  // prórroga ni el alta médica, hay que avisar — probablemente falta actualizarla.
  function licenciaVencidaSinActualizar_(licencias) {
    if (!licencias || licencias.length === 0) return null;
    var ordenadas = licencias.slice().sort(function (a, b) {
      return new Date(b.Fecha_Termino || b.Fecha_Inicio) - new Date(a.Fecha_Termino || a.Fecha_Inicio);
    });
    var ultima = ordenadas[0];
    if (ultima.Tipo === 'Alta médica') return null;
    if (ultima.Fecha_Termino && esFechaAnteriorAHoy_(ultima.Fecha_Termino)) return ultima;
    return null;
  }

  SERVICIOS.listarLicenciasPorCaso = function (idCaso) {
    return sheetLeerObjetos_('Licencias_Medicas').then(function (todas) {
      return todas.filter(function (l) { return l.ID_Caso === idCaso; })
        .sort(function (a, b) { return new Date(a.Fecha_Inicio) - new Date(b.Fecha_Inicio); });
    });
  };

  SERVICIOS.crearLicencia = function (idCaso, datos) {
    return generarIdSecuencial_('LIC', 'Licencias_Medicas', 'ID_Licencia').then(function (idLicencia) {
      var licencia = {
        ID_Licencia: idLicencia, ID_Caso: idCaso, Tipo: datos.Tipo || 'Reposo inicial',
        Fecha_Inicio: datos.Fecha_Inicio || '', Fecha_Termino: datos.Fecha_Termino || '',
        Dias: datos.Fecha_Inicio && datos.Fecha_Termino ? calcularDiasEntre_(datos.Fecha_Inicio, datos.Fecha_Termino) : (datos.Dias || ''),
        Origen: datos.Origen || 'Manual', Numero_Siniestro_Mutual: datos.Numero_Siniestro_Mutual || '',
        Archivo_URL: '', Archivo_Nombre: '', Fecha_Carga: '', Cargado_Por: '',
        Registrado_Por: state.usuario.email, Fecha_Registro: formatearFechaHoraISO_(new Date())
      };
      return sheetAppendObjeto_('Licencias_Medicas', licencia)
        .then(function () { return registrarHistorial_(idLicencia, 'Licencia', 'creacion', licencia.Tipo + ' — ' + (licencia.Dias || '?') + ' día(s), caso ' + idCaso); })
        .then(function () { return SERVICIOS.listarLicenciasPorCaso(idCaso); });
    });
  };

  SERVICIOS.subirEvidenciaLicencia = function (idLicencia, base64Data, mimeType, nombreOriginal) {
    return buscarFilaPor_('Licencias_Medicas', 'ID_Licencia', idLicencia).then(function (l) {
      if (!l) throw new Error('Licencia no encontrada');
      return obtenerSubcarpetaCaso_(l.ID_Caso, 'Licencias_Medicas').then(function (idCarpeta) {
        return driveSubirBase64_(idCarpeta, base64Data, mimeType, nombreOriginal || 'licencia');
      }).then(function (archivo) {
        return sheetActualizarPorId_('Licencias_Medicas', 'ID_Licencia', idLicencia, {
          Archivo_URL: archivo.webViewLink || '', Archivo_Nombre: archivo.name || nombreOriginal || 'licencia',
          Fecha_Carga: formatearFechaHoraISO_(new Date()), Cargado_Por: state.usuario.email
        });
      }).then(function () {
        return registrarHistorial_(idLicencia, 'Licencia', 'carga_documento', 'Documento de licencia adjuntado: ' + (nombreOriginal || 'licencia'));
      }).then(function () { return SERVICIOS.listarLicenciasPorCaso(l.ID_Caso); });
    });
  };

  // ── Importación de la nómina de Mutual (Excel) ──────────────────────

  function normalizarRut_(rut) {
    return String(rut || '').replace(/[^0-9kK]/g, '').toUpperCase();
  }

  // La nómina de Mutual trae fechas como texto "DD-MM-YYYY" o "DD-MM-YYYY HH:MM"
  function parsearFechaChilena_(texto) {
    if (!texto) return '';
    var soloFecha = String(texto).trim().split(' ')[0];
    var partes = soloFecha.split('-');
    if (partes.length !== 3 || partes[2].length !== 4) return '';
    return partes[2] + '-' + partes[1].padStart(2, '0') + '-' + partes[0].padStart(2, '0');
  }

  // Mapea el texto de la nómina ("ACCIDENTE DE TRABAJO") a exactamente uno
  // de los 3 valores fijos que usa el select de Tipo_Siniestro del sistema
  // — un title-case genérico dejaría "Accidente De Trabajo" (con "De" en
  // mayúscula) y el autocompletado del formulario no lo reconocería.
  function normalizarTipoSiniestro_(texto) {
    var t = String(texto || '').toUpperCase().trim();
    if (t.indexOf('TRAYECTO') !== -1) return 'Accidente de Trayecto';
    if (t.indexOf('TRABAJO') !== -1) return 'Accidente de Trabajo';
    if (t.indexOf('ENFERMEDAD') !== -1) return 'Enfermedad Profesional';
    return texto || '';
  }

  // Convierte las filas crudas del Excel (array de arrays, primera fila = encabezados)
  // en registros normalizados, usando los nombres de columna exactos de la nómina Mutual.
  function parsearNominaMutual_(filas) {
    if (!filas || filas.length < 2) return [];
    var headers = filas[0];
    var idx = {};
    headers.forEach(function (h, i) { idx[h] = i; });

    return filas.slice(1)
      .filter(function (f) { return f.some(function (c) { return c !== '' && c != null; }); })
      .map(function (f) {
        var rutNum = f[idx['Rut Trabajador']], dv = f[idx['Dígito Rut trabajador']];
        var fechaInicio = parsearFechaChilena_(f[idx['Fecha inicio reposo']]);
        var fechaTermino = parsearFechaChilena_(f[idx['Fecha término reposo']]);
        return {
          rutCompleto: normalizarRut_(String(rutNum || '') + String(dv || '')),
          rutFormateado: String(rutNum || '') + '-' + String(dv || ''),
          nombreCompleto: [f[idx['Nombre trabajador']], f[idx['Apellido paterno trabajador']], f[idx['Apellido materno trabajador']]].filter(Boolean).join(' '),
          tipoSiniestro: normalizarTipoSiniestro_(f[idx['Motivo de denuncia']]),
          estadoCalificacion: f[idx['Estado de Calificación']],
          fechaInicioReposo: fechaInicio,
          fechaTerminoReposo: fechaTermino,
          diasReposo: Number(f[idx['Días reposo']]) || 0,
          numeroSiniestro: String(f[idx['Número de siniestro']] || '').trim(),
          centroAtencion: f[idx['Centro de atención Mutual']] || '',
          fechaAltaLaboral: parsearFechaChilena_(f[idx['Fecha alta laboral']]),
          fechaAltaMedica: parsearFechaChilena_(f[idx['Fecha alta médica']])
        };
      })
      .filter(function (r) { return r.numeroSiniestro; });
  }

  // Empareja una fila de la nómina con un caso existente: primero por N° de
  // siniestro Mutual ya guardado (el cruce más confiable), si no por RUT —
  // y si el mismo trabajador tiene más de un caso, por cercanía de fecha.
  function emparejarFilaConCaso_(fila, casos) {
    var porSiniestro = casos.filter(function (c) { return c.Numero_Siniestro_Mutual && c.Numero_Siniestro_Mutual.trim() === fila.numeroSiniestro; })[0];
    if (porSiniestro) return porSiniestro;

    var candidatos = casos.filter(function (c) { return normalizarRut_(c.RUT_Trabajador) === fila.rutCompleto; });
    if (candidatos.length === 0) return null;
    if (candidatos.length === 1) return candidatos[0];

    var fechaRef = fila.fechaInicioReposo || fila.fechaAltaLaboral;
    candidatos.sort(function (a, b) {
      var da = Math.abs(new Date(a.Fecha_Siniestro) - new Date(fechaRef || a.Fecha_Siniestro));
      var db = Math.abs(new Date(b.Fecha_Siniestro) - new Date(fechaRef || b.Fecha_Siniestro));
      return da - db;
    });
    return candidatos[0];
  }

  // Aplica una fila emparejada: guarda el N° de siniestro Mutual en el caso
  // si no lo tenía, y crea o actualiza (si ya se había importado antes, por
  // el mismo N° de siniestro) la licencia médica correspondiente.
  SERVICIOS.importarLicenciaDesdeNomina = function (idCaso, fila) {
    return buscarFilaPor_('Casos', 'ID_Caso', idCaso).then(function (caso) {
      if (!caso) throw new Error('Caso ' + idCaso + ' no encontrado.');

      var actualizarCaso = !caso.Numero_Siniestro_Mutual
        ? sheetActualizarPorId_('Casos', 'ID_Caso', idCaso, { Numero_Siniestro_Mutual: fila.numeroSiniestro })
        : Promise.resolve();

      var dias = fila.fechaTerminoReposo ? calcularDiasEntre_(fila.fechaInicioReposo, fila.fechaTerminoReposo) : (fila.diasReposo || '');
      var tipo = fila.fechaAltaMedica ? 'Alta médica' : 'Reposo inicial';

      return actualizarCaso
        .then(function () { return sheetLeerObjetos_('Licencias_Medicas'); })
        .then(function (licencias) {
          var existente = licencias.filter(function (l) { return l.ID_Caso === idCaso && l.Numero_Siniestro_Mutual === fila.numeroSiniestro; })[0];
          if (existente) {
            return sheetActualizarPorId_('Licencias_Medicas', 'ID_Licencia', existente.ID_Licencia, {
              Fecha_Termino: fila.fechaTerminoReposo || existente.Fecha_Termino, Dias: dias || existente.Dias, Tipo: tipo
            }).then(function () { return 'actualizada'; });
          }
          return generarIdSecuencial_('LIC', 'Licencias_Medicas', 'ID_Licencia').then(function (idLicencia) {
            return sheetAppendObjeto_('Licencias_Medicas', {
              ID_Licencia: idLicencia, ID_Caso: idCaso, Tipo: tipo,
              Fecha_Inicio: fila.fechaInicioReposo, Fecha_Termino: fila.fechaTerminoReposo, Dias: dias,
              Origen: 'Importado', Numero_Siniestro_Mutual: fila.numeroSiniestro,
              Archivo_URL: '', Archivo_Nombre: '', Fecha_Carga: '', Cargado_Por: '',
              Registrado_Por: state.usuario.email, Fecha_Registro: formatearFechaHoraISO_(new Date())
            }).then(function () { return 'creada'; });
          });
        });
    }).then(function (accion) {
      return registrarHistorial_(idCaso, 'Caso', 'edicion', 'Licencia ' + accion + ' desde nómina Mutual (siniestro ' + fila.numeroSiniestro + ')');
    });
  };

  var DIAS_SEMANA_ORDEN = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
  var HORAS_RANGO_ORDEN = ['Madrugada (00-06)', 'Mañana (06-12)', 'Tarde (12-18)', 'Noche (18-24)'];
  var MESES_CORTOS = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];

  function diaSemanaDe_(fechaISO) {
    if (!fechaISO) return null;
    var d = new Date(fechaISO + 'T12:00:00'); // mediodía, evita corrimiento por huso horario
    if (isNaN(d.getTime())) return null;
    return DIAS_SEMANA_ORDEN[(d.getDay() + 6) % 7]; // reordena para que Lunes quede primero
  }

  function rangoHoraDe_(horaStr) {
    if (!horaStr) return null;
    var h = parseInt(String(horaStr).split(':')[0], 10);
    if (isNaN(h)) return null;
    if (h < 6) return 'Madrugada (00-06)';
    if (h < 12) return 'Mañana (06-12)';
    if (h < 18) return 'Tarde (12-18)';
    return 'Noche (18-24)';
  }

  SERVICIOS.obtenerDesgloseDashboard = function () {
    return Promise.all([sheetLeerObjetos_('Casos'), sheetLeerObjetos_('Licencias_Medicas')]).then(function (res) {
      var casos = res[0], licencias = res[1];
      var porCliente = {}, porGravedad = {}, porCategoriaCausa = {}, porProyecto = {}, porSucursal = {};
      var porDiaSemana = {}, porHoraRango = {}, porTipoSiniestro = {}, diasLicenciaPorTipoSiniestro = {};
      DIAS_SEMANA_ORDEN.forEach(function (d) { porDiaSemana[d] = 0; });
      HORAS_RANGO_ORDEN.forEach(function (h) { porHoraRango[h] = 0; });

      casos.forEach(function (c) {
        porCliente[c.Cliente] = (porCliente[c.Cliente] || 0) + 1;
        porGravedad[c.Gravedad] = (porGravedad[c.Gravedad] || 0) + 1;
        if (c.Categoria_Causa) porCategoriaCausa[c.Categoria_Causa] = (porCategoriaCausa[c.Categoria_Causa] || 0) + 1;
        if (c.Proyecto) porProyecto[c.Proyecto] = (porProyecto[c.Proyecto] || 0) + 1;
        if (c.Sucursal) porSucursal[c.Sucursal] = (porSucursal[c.Sucursal] || 0) + 1;
        if (c.Tipo_Siniestro) porTipoSiniestro[c.Tipo_Siniestro] = (porTipoSiniestro[c.Tipo_Siniestro] || 0) + 1;
        var dia = diaSemanaDe_(c.Fecha_Siniestro);
        if (dia) porDiaSemana[dia]++;
        var rango = rangoHoraDe_(c.Hora_Siniestro);
        if (rango) porHoraRango[rango]++;
      });

      licencias.forEach(function (l) {
        var caso = casos.filter(function (c) { return c.ID_Caso === l.ID_Caso; })[0];
        if (!caso || !caso.Tipo_Siniestro) return;
        diasLicenciaPorTipoSiniestro[caso.Tipo_Siniestro] = (diasLicenciaPorTipoSiniestro[caso.Tipo_Siniestro] || 0) + (Number(l.Dias) || 0);
      });

      return {
        por_cliente: porCliente, por_gravedad: porGravedad, por_categoria_causa: porCategoriaCausa,
        por_proyecto: porProyecto, por_sucursal: porSucursal, por_dia_semana: porDiaSemana, por_hora_rango: porHoraRango,
        por_tipo_siniestro: porTipoSiniestro, dias_licencia_por_tipo_siniestro: diasLicenciaPorTipoSiniestro
      };
    });
  };

  SERVICIOS.obtenerTendenciaMensual = function () {
    return sheetLeerObjetos_('Casos').then(function (casos) {
      var conteo = {};
      casos.forEach(function (c) {
        if (!c.Fecha_Siniestro) return;
        var d = new Date(c.Fecha_Siniestro + 'T12:00:00');
        if (isNaN(d.getTime())) return;
        var clave = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        conteo[clave] = (conteo[clave] || 0) + 1;
      });
      return Object.keys(conteo).sort().map(function (clave) {
        var partes = clave.split('-');
        return { clave: clave, etiqueta: MESES_CORTOS[parseInt(partes[1], 10) - 1] + ' ' + partes[0], valor: conteo[clave] };
      });
    });

  // Reparte los días de una licencia entre los meses calendario que
  // realmente cubre (día por día) — una licencia que parte el 1 de febrero
  // y dura 50 días cuenta 28 días en febrero y 22 en marzo, no los 50 en
  // el mes en que ocurrió el accidente.
  function distribuirDiasLicenciaPorMes_(fechaInicioISO, fechaTerminoISO) {
    var resultado = {};
    if (!fechaInicioISO || !fechaTerminoISO) return resultado;
    var cursor = new Date(fechaInicioISO + 'T12:00:00');
    var fin = new Date(fechaTerminoISO + 'T12:00:00');
    if (isNaN(cursor.getTime()) || isNaN(fin.getTime()) || cursor > fin) return resultado;
    while (cursor <= fin) {
      var clave = cursor.getFullYear() + '-' + String(cursor.getMonth() + 1).padStart(2, '0');
      resultado[clave] = (resultado[clave] || 0) + 1;
      cursor.setDate(cursor.getDate() + 1);
    }
    return resultado;
  }

  // Suma, mes a mes, los días de TODAS las licencias — cada licencia aporta
  // sus días exactamente a los meses calendario que ocupa (ver función de
  // arriba), no al mes en que ocurrió el accidente que la originó.
  SERVICIOS.obtenerTendenciaMensualLicencias = function () {
    return sheetLeerObjetos_('Licencias_Medicas').then(function (licencias) {
      var conteo = {};
      licencias.forEach(function (l) {
        var distribucion = distribuirDiasLicenciaPorMes_(l.Fecha_Inicio, l.Fecha_Termino);
        Object.keys(distribucion).forEach(function (clave) { conteo[clave] = (conteo[clave] || 0) + distribucion[clave]; });
      });
      return Object.keys(conteo).sort().map(function (clave) {
        var partes = clave.split('-');
        return { clave: clave, etiqueta: MESES_CORTOS[parseInt(partes[1], 10) - 1] + ' ' + partes[0], valor: conteo[clave] };
      });
    });
  };

  // ── Parser genérico por etiquetas (línea por línea) ─────────────────
  // "Etiqueta: valor" en la misma línea, o etiqueta sola con el valor en
  // la línea siguiente. Es coincidencia de texto, no un modelo de lenguaje
  // — su precisión depende de que el PDF respete el formato esperado. El
  // formulario SIEMPRE queda editable: el usuario revisa antes de guardar.
  function buscarValorPorEtiquetaGenerico_(lineas, etiquetas, todasLasEtiquetasConocidas) {
    for (var i = 0; i < lineas.length; i++) {
      var linea = lineas[i];
      for (var j = 0; j < etiquetas.length; j++) {
        var etiqueta = etiquetas[j];
        var idx = linea.toLowerCase().indexOf(etiqueta.toLowerCase());
        if (idx === -1) continue;
        var resto = linea.substring(idx + etiqueta.length).replace(/^[:\s]+/, '').trim();
        if (resto.length > 0 && resto.length < 120) return resto;
        if (i + 1 < lineas.length) {
          var siguiente = lineas[i + 1];
          var esOtraEtiqueta = (todasLasEtiquetasConocidas || []).some(function (e) { return siguiente.toLowerCase().indexOf(e.toLowerCase()) === 0; });
          if (!esOtraEtiqueta) return siguiente;
        }
      }
    }
    return '';
  }

  function buscarParrafoDespuesDeGenerico_(lineas, etiquetas, corteEn) {
    for (var i = 0; i < lineas.length; i++) {
      var coincide = etiquetas.some(function (e) { return lineas[i].toLowerCase().indexOf(e.toLowerCase()) !== -1; });
      if (!coincide) continue;
      var parrafo = [];
      for (var j = i + 1; j < lineas.length && j < i + 9; j++) {
        if (corteEn && lineas[j].toLowerCase().indexOf(corteEn.toLowerCase()) !== -1) break;
        parrafo.push(lineas[j]);
      }
      return parrafo.join(' ');
    }
    return '';
  }

  function aLineas_(texto) {
    return texto.split('\n').map(function (l) { return l.trim(); }).filter(function (l) { return l.length > 0; });
  }

  // Recorta el texto entre dos marcas (para no mezclar, por ejemplo, el RUT
  // de la empresa con el del trabajador — cada uno vive en su sección).
  function segmentoEntre_(texto, inicioMarca, finMarca) {
    var idxInicio = texto.toLowerCase().indexOf(inicioMarca.toLowerCase());
    if (idxInicio === -1) return texto;
    var idxFin = finMarca ? texto.toLowerCase().indexOf(finMarca.toLowerCase(), idxInicio + inicioMarca.length) : -1;
    return idxFin === -1 ? texto.substring(idxInicio) : texto.substring(idxInicio, idxFin);
  }

  // Rótulos tal como aparecen en el informe de investigación interno
  // (formato ZN-FT-SST-050).
  var ETIQUETAS_FORMATO_ZENER = {
    APR_A_Cargo: ['APR A CARGO'], Dependencia: ['Dependencia'], Nombre_Empresa: ['Nombre de empresa'],
    RUT_Trabajador: ['RUT Trabajador'], Nombre_Trabajador: ['Nombre Trabajador'], Cargo: ['Cargo'],
    Region: ['Región', 'Region'], Supervisor_A_Cargo: ['Supervisor a cargo'], Tipo_Servicio: ['Tipo de servicio'],

  var TODAS_ETIQUETAS_ZENER_ = Object.keys(ETIQUETAS_FORMATO_ZENER).reduce(function (a, k) { return a.concat(ETIQUETAS_FORMATO_ZENER[k]); }, []);

  function parsearCamposFormatoZener_(texto) {
    var lineas = aLineas_(texto);

  // OCR de DIAT — best-effort. A diferencia del informe interno (que trae
  // "Campo: valor" en líneas claras), la DIAT es un formulario oficial con
  // casilleros marcados (X): esos NO se leen de forma confiable por OCR de
  // texto plano (gravedad, tipo de accidente, sexo, tipo de empresa, etc.)
  // — por eso solo se intentan los campos escritos a mano/máquina, acotando
  // la búsqueda a la sección correspondiente del formulario para no

  function csvDe_(filas) {
    return filas.map(function (fila) { return fila.map(function (c) { return typeof c === 'string' && (c.indexOf(',') !== -1 || c.indexOf('"') !== -1) ? '"' + c.replace(/"/g, '""') + '"' : c; }).join(','); }).join('\r\n');
  }
  function aFilasCSV_(objs, headers) {

  }
  function descargarCSV_(nombreArchivo, objs) {
    var contenido = objs.length > 0 ? csvDe_(aFilasCSV_(objs)) : 'Sin datos';
