  // ── Autenticación real (Google Identity Services) ───────────────────

  var API_SHEETS = 'https://sheets.googleapis.com/v4/spreadsheets';
  var API_DRIVE = 'https://www.googleapis.com/drive/v3';
  var API_DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3/files';

  var tokenClient = null;
  var accessToken = null;

  function initGis_() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: CONFIG.SCOPES,
      callback: function (resp) {
        if (resp.error) { mostrarErrorAcceso_('No se pudo iniciar sesión con Google: ' + resp.error); return; }
        accessToken = resp.access_token;
        onLoginExitoso_();
      }
    });
  }

  function login_() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

  function reautenticarSilencioso_() {
    return new Promise(function (resolve, reject) {
      tokenClient.callback = function (resp) {
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        resolve();
      };
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }

  // Envoltorio de fetch: agrega el token, reintenta una vez si expiró (401).
  function apiFetch_(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization': 'Bearer ' + accessToken }, opts.headers || {});
    return fetch(url, opts).then(function (resp) {
      if (resp.status === 401) {
        return reautenticarSilencioso_().then(function () {
          opts.headers['Authorization'] = 'Bearer ' + accessToken;
          return fetch(url, opts);
        });
      }
      return resp;
    }).then(function (resp) {
      if (!resp.ok) {
        return resp.text().then(function (texto) { throw new Error('Error API (' + resp.status + '): ' + texto.substring(0, 300)); });
      }
      return resp;
    });
  }

  // ── Sheets API — helpers genéricos ──────────────────────────────────

  function sheetGetAll_(nombreHoja) {
    var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja);
    return apiFetch_(url).then(function (r) { return r.json(); }).then(function (d) { return d.values || []; });
  }

  function filasAObjetos_(filas) {
    if (filas.length < 2) return [];
    var headers = filas[0];
    return filas.slice(1)
      .filter(function (f) { return f.some(function (c) { return c !== '' && c !== undefined; }); })
      .map(function (f) {
        var obj = {};
        headers.forEach(function (h, j) { obj[h] = f[j] !== undefined ? f[j] : ''; });
        return obj;
      });
  }

  function sheetHeaders_(nombreHoja) {
    var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja + '!1:1');
    return apiFetch_(url).then(function (r) { return r.json(); }).then(function (d) { return (d.values && d.values[0]) || []; });
  }

  function sheetLeerObjetos_(nombreHoja) { return sheetGetAll_(nombreHoja).then(filasAObjetos_); }

  function sheetAppendObjeto_(nombreHoja, obj) {
    return sheetHeaders_(nombreHoja).then(function (headers) {
      var fila = headers.map(function (h) { return (obj[h] !== undefined && obj[h] !== null) ? obj[h] : ''; });
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja) +
        '!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return apiFetch_(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [fila] }) });
    });
  }

  function columnaALetra_(idx) {
    var letra = '';
    idx += 1;
    while (idx > 0) {
      var rem = (idx - 1) % 26;
      letra = String.fromCharCode(65 + rem) + letra;
      idx = Math.floor((idx - 1) / 26);
    }
    return letra;
  }

  // Actualiza una o más columnas de la fila cuyo idColumna coincide con idValor.
  function sheetActualizarPorId_(nombreHoja, idColumna, idValor, cambios) {
    return Promise.all([sheetHeaders_(nombreHoja), sheetGetAll_(nombreHoja)]).then(function (res) {
      var headers = res[0], filas = res[1];
      var idxCol = headers.indexOf(idColumna);
      var filaEncontrada = -1;
      for (var i = 1; i < filas.length; i++) {
        if (String(filas[i][idxCol]) === String(idValor)) { filaEncontrada = i + 1; break; }
      }
      if (filaEncontrada === -1) throw new Error('No se encontró ' + idColumna + '=' + idValor + ' en ' + nombreHoja);

      var data = Object.keys(cambios).map(function (campo) {
        var col = headers.indexOf(campo);
        if (col === -1) return null;
        return { range: nombreHoja + '!' + columnaALetra_(col) + filaEncontrada, values: [[cambios[campo]]] };
      }).filter(function (x) { return x; });

      if (data.length === 0) return;
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values:batchUpdate';
      return apiFetch_(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: data })
      });
    });
  }

  function buscarFilaPor_(nombreHoja, campo, valor) {
    return sheetLeerObjetos_(nombreHoja).then(function (filas) {
      return filas.filter(function (f) { return String(f[campo]) === String(valor); })[0] || null;
    });
  }

  function generarIdSecuencial_(prefijo, nombreHoja, idColumna) {
    return sheetLeerObjetos_(nombreHoja).then(function (filas) {
      var maxNum = 0;
      filas.forEach(function (f) {
        var partes = String(f[idColumna]).split('-');
        var n = parseInt(partes[partes.length - 1], 10);
        if (!isNaN(n) && n > maxNum) maxNum = n;
      });
      return prefijo + '-' + String(maxNum + 1).padStart(5, '0');
    });
  }

  function generarIdCaso_() {
    var anio = new Date().getFullYear();
    return sheetLeerObjetos_('Casos').then(function (filas) {
      var patron = 'CASO-' + anio + '-';
      var contador = 0;
      filas.forEach(function (f) { if (String(f.ID_Caso).indexOf(patron) === 0) contador++; });
      return patron + String(contador + 1).padStart(3, '0');
    });
  }

  // ── Drive API — helpers genéricos ───────────────────────────────────

  function driveGetOrCrearCarpeta_(nombre, parentId) {
    var nombreEscapado = nombre.replace(/'/g, "\\'");
    var q = encodeURIComponent("name='" + nombreEscapado + "' and '" + parentId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    return apiFetch_(API_DRIVE + '/files?q=' + q + '&fields=files(id,name)').then(function (r) { return r.json(); }).then(function (d) {
      if (d.files && d.files.length > 0) return d.files[0].id;
      return apiFetch_(API_DRIVE + '/files?fields=id', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nombre, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
      }).then(function (r) { return r.json(); }).then(function (d2) { return d2.id; });
    });
  }

  function base64AblobUtil_(base64, mimeType) {
    var bytes = atob(base64);
    var arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mimeType || 'application/octet-stream' });
  }

  function multipartBody_(metadata, blob, boundary) {
    var cabecera = new Blob(
      ['--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
       '\r\n--' + boundary + '\r\nContent-Type: ' + (blob.type || 'application/octet-stream') + '\r\n\r\n'],
      { type: 'text/plain' }
    );
    var cierre = new Blob(['\r\n--' + boundary + '--'], { type: 'text/plain' });
    return new Blob([cabecera, blob, cierre]);
  }

  function driveSubirBase64_(parentId, base64, mimeType, nombreArchivo) {
    var blob = base64AblobUtil_(base64, mimeType);
    var boundary = '-------sst' + Math.random().toString(36).slice(2);
    var cuerpo = multipartBody_({ name: nombreArchivo, parents: [parentId] }, blob, boundary);
    return apiFetch_(API_DRIVE_UPLOAD + '?uploadType=multipart&fields=id,webViewLink,name', {
      method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: cuerpo
    }).then(function (r) { return r.json(); });
  }

  function driveSobrescribirBase64_(fileId, base64, mimeType) {
    var blob = base64AblobUtil_(base64, mimeType);
    return apiFetch_(API_DRIVE_UPLOAD + '/' + fileId + '?uploadType=media&fields=id,webViewLink,name', {
      method: 'PATCH', headers: { 'Content-Type': mimeType || 'application/octet-stream' }, body: blob
    }).then(function (r) { return r.json(); });
  }

  // OCR: sube el PDF convirtiéndolo a Google Doc con reconocimiento de texto,
  // exporta el texto plano resultante, y bota el Doc temporal a la papelera.
  function driveOcrExtraerTexto_(base64, mimeType) {
    var blob = base64AblobUtil_(base64, mimeType);
    var boundary = '-------sstocr' + Math.random().toString(36).slice(2);
    var cuerpo = multipartBody_({ name: 'OCR_TEMP_' + Date.now(), mimeType: 'application/vnd.google-apps.document' }, blob, boundary);

    return apiFetch_(API_DRIVE_UPLOAD + '?uploadType=multipart&ocrLanguage=es&fields=id', {
      method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: cuerpo
    }).then(function (r) { return r.json(); }).then(function (creado) {
      return apiFetch_(API_DRIVE + '/files/' + creado.id + '/export?mimeType=text/plain')
        .then(function (r) { return r.text(); })
        .then(function (texto) {
          apiFetch_(API_DRIVE + '/files/' + creado.id, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ trashed: true })
          }).catch(function () {});
          return texto;
        });
    });
  }

    if (puede('exportar_csv')) html += '<button class="btn btn-secundario" onclick="exportarRespaldo(this)">Exportar respaldo (ZIP)</button>';
    html += '</div>';

    elContenido().innerHTML = html;
  }

  function barraDesglose_(titulo, mapa, ordenFijo) {
    var claves = ordenFijo ? ordenFijo.slice() : Object.keys(mapa || {}).filter(function (k) { return k && k !== 'undefined'; });
    if (claves.length === 0) {
      return '<h3 style="margin-bottom:14px;">' + titulo + '</h3><p style="color:var(--texto-tenue); font-size:13px;">Sin datos aún.</p>';
    }
    var total = claves.reduce(function (s, k) { return s + (mapa[k] || 0); }, 0);
    if (!ordenFijo && total === 0) {
      return '<h3 style="margin-bottom:14px;">' + titulo + '</h3><p style="color:var(--texto-tenue); font-size:13px;">Sin datos aún.</p>';
    }
    if (!ordenFijo) claves.sort(function (a, b) { return (mapa[b] || 0) - (mapa[a] || 0); });
    var html = '<h3 style="margin-bottom:14px;">' + titulo + '</h3>';
    html += claves.map(function (k) {
      var valor = mapa[k] || 0;
      var pct = total > 0 ? Math.round((valor / total) * 100) : 0;
      return '<div style="margin-bottom:10px;">' +
        '<div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;">' +
          '<span>' + escapeHtml(k) + '</span><span class="mono">' + valor + '</span>' +
        '</div>' +
        '<div class="barra-progreso"><div class="barra-progreso-relleno" style="width:' + pct + '%;"></div></div>' +
      '</div>';
    }).join('');
    return html;
  }

  function tarjetaTendenciaMensual_(titulo, serie) {
    var html = '<h3 style="margin-bottom:14px;">' + titulo + '</h3>';
    if (serie.length === 0 || serie.every(function (s) { return !s.valor; })) {
      return html + '<p style="color:var(--texto-tenue); font-size:13px;">Sin datos aún.</p>';
    }
    var max = Math.max.apply(null, serie.map(function (s) { return s.valor; })) || 1;
    html += '<div style="display:flex; align-items:flex-end; gap:14px; height:130px; padding-top:10px;">' +
      serie.map(function (s) {
        var alturaPct = Math.max(Math.round((s.valor / max) * 100), 8);
        return '<div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; min-width:40px;">' +
          '<span class="mono" style="font-size:12px; margin-bottom:4px;">' + s.valor + '</span>' +
          '<div style="width:100%; max-width:38px; background:var(--color-acento); border-radius:4px 4px 0 0; height:' + alturaPct + '%;"></div>' +
          '<span style="font-size:11px; color:var(--texto-tenue); margin-top:6px; text-transform:capitalize; white-space:nowrap;">' + s.etiqueta + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
    return html;
  }

  function exportarRespaldo(boton) {
    conSpinner(boton, llamar('exportarRespaldoCompletoZIP')).then(function (res) {
      descargarBase64_(res.base64, res.nombreArchivo, 'application/zip');
      mostrarToast('Respaldo generado: ' + res.nombreArchivo, 'exito');
    }).catch(mostrarError);
  }

  function descargarBase64_(base64, nombreArchivo, mimeType) {
    var link = document.createElement('a');
    link.href = 'data:' + mimeType + ';base64,' + base64;
    link.download = nombreArchivo;
    document.body.appendChild(link);
    link.click();
    link.remove();
  }
</script>

    'RUT_Trabajador', 'Nombre_Trabajador', 'Cargo', 'Region', 'Fecha_Contrato', 'Edad', 'Legalidad', 'Supervisor_A_Cargo',
    'Tipo_Siniestro', 'Calificacion', 'Fecha_Siniestro', 'Hora_Siniestro', 'Direccion', 'Comuna', 'Ciudad',
    'Hora_Ingreso_Turno', 'Horas_Trabajo_Al_Momento', 'Dias_Reposo', 'Fecha_Inicio_Reposo', 'Gravedad', 'Numero_Siniestro_Mutual',
    'Descripcion_Accidente', 'Causa_Raiz', 'Grupo_Causa', 'Categoria_Causa', 'APR_A_Cargo', 'Nombre_Redacta', 'Nombre_Revisa', 'Nombre_Aprueba', 'Observaciones'
  ];

  function recolectarFormCaso_() {
    var datos = {};
    CAMPOS_FORM_CASO.forEach(function (campo) {
      var el = document.getElementById('campo-' + campo);
      if (el) datos[campo] = el.value.trim ? el.value.trim() : el.value;
    });
    return datos;
  }

  function pintarFormCaso_(campos) {
    var rellenados = 0;
    Object.keys(campos).forEach(function (campo) {
      var el = document.getElementById('campo-' + campo);
      if (el && campos[campo]) {
        el.value = campos[campo];
        rellenados++;
      }
    });
    return rellenados;
  }

  // ── OCR ──────────────────────────────────────────────────────────────

  function onCambioTipoSiniestro_(valor) {
    var zona = document.getElementById('zona-documento-inicial');
    state.diatPendiente = null;
    state.diepPendiente = null;
    if (valor === 'Accidente de Trabajo' || valor === 'Accidente de Trayecto') {
      zona.innerHTML =
        '<div style="border-top:1px solid var(--borde); padding-top:14px;">' +
          '<strong style="font-size:13px;">Subir DIAT (opcional — autocompleta el formulario)</strong>' +
          '<p style="font-size:12px; color:var(--texto-secundario); margin:6px 0 10px;">' +
            'El sistema intenta reconocer los campos escritos (RUT, nombres, direcciones, fechas, horas, descripción del accidente). ' +
            'Los campos con casillero — gravedad, tipo de accidente — no se leen de forma confiable por OCR: revísalos y complétalos tú siempre.' +
          '</p>' +
          '<div class="zona-carga" onclick="document.getElementById(\'input-ocr-diat\').click()" id="zona-ocr-diat">&#8593; Haz clic para seleccionar el PDF de la DIAT</div>' +
          '<input type="file" id="input-ocr-diat" accept="application/pdf" style="display:none;" onchange="manejarOCRDIAT_(this)">' +
        '</div>';
    } else if (valor === 'Enfermedad Profesional') {
      zona.innerHTML =
        '<div style="border-top:1px solid var(--borde); padding-top:14px;">' +
          '<strong style="font-size:13px;">Subir DIEP (se archiva como respaldo — no se autocompleta)</strong>' +
          '<p style="font-size:12px; color:var(--texto-secundario); margin:6px 0 10px;">' +
            'La DIEP la emite Zener directamente, así que aquí solo queda archivada en el checklist del caso. Completa el formulario de abajo a mano.' +
          '</p>' +
          '<div class="zona-carga" onclick="document.getElementById(\'input-diep\').click()" id="zona-diep">&#8593; Haz clic para seleccionar el PDF de la DIEP</div>' +
          '<input type="file" id="input-diep" accept="application/pdf" style="display:none;" onchange="manejarCargaDIEP_(this)">' +
        '</div>';
    } else {
      zona.innerHTML = '';
    }
  }

  function manejarOCRDIAT_(input) {
    var file = input.files[0];
    if (!file) return;

    var zona = document.getElementById('zona-ocr-diat');
    zona.innerHTML = '<span class="spinner" style="border-top-color:var(--color-acento); border-color:var(--borde);"></span> Leyendo PDF y reconociendo texto…';

    leerArchivoBase64(file).then(function (archivo) {
      state.diatPendiente = archivo; // se reusa para archivar el PDF completo (ítem DIAT) al guardar el caso
      return llamar('ocrExtraerDatosDesdeDIAT', archivo.base64, archivo.mimeType, archivo.nombre);
    }).then(function (res) {
      var n = pintarFormCaso_(res.campos);
      zona.innerHTML = '&#10003; DIAT procesada — se completaron ' + n + ' campos automáticamente. Revisa especialmente gravedad y tipo de accidente (no se leen por OCR).';
      mostrarToast('Se autocompletaron ' + n + ' campos desde la DIAT. Revísalos antes de guardar.', 'exito');
    }).catch(function (err) {
      zona.innerHTML = '&#8593; Haz clic para seleccionar el PDF de la DIAT';
      mostrarError('No se pudo procesar la DIAT: ' + (err.message || err) + '. Puedes llenar el formulario manualmente.');
    });
  }

  function manejarCargaDIEP_(input) {
    var file = input.files[0];
    if (!file) return;
    leerArchivoBase64(file).then(function (archivo) {
      state.diepPendiente = archivo;
      document.getElementById('zona-diep').innerHTML = '&#10003; DIEP cargada — se archivará en el checklist del caso al guardar.';
      mostrarToast('DIEP lista para archivar.', 'exito');
    }).catch(function (err) { mostrarError('No se pudo leer el archivo: ' + (err.message || err)); });
  }

  function manejarOCRInvestigacionNuevoCaso_(input) {
    var file = input.files[0];
    if (!file) return;

    var zona = document.getElementById('zona-ocr-investigacion');
    zona.innerHTML = '<span class="spinner" style="border-top-color:var(--color-acento); border-color:var(--borde);"></span> Leyendo PDF y reconociendo texto…';

    leerArchivoBase64(file).then(function (archivo) {
      state.ocrPendiente = archivo; // se reusa para archivar el PDF completo (ítem INV-01) al guardar el caso
      return llamar('ocrExtraerDatosDesdeInforme', archivo.base64, archivo.mimeType, archivo.nombre);
    }).then(function (res) {
      var n = pintarFormCaso_(res.campos);
      zona.innerHTML = '&#10003; Informe procesado — se completaron ' + n + ' campos, incluida la causa raíz. Revísalos antes de guardar.';
      mostrarToast('Se autocompletaron ' + n + ' campos desde el informe de investigación.', 'exito');
    }).catch(function (err) {
      zona.innerHTML = '&#8593; Haz clic para seleccionar el PDF del informe (opcional)';
      mostrarError('No se pudo procesar el PDF: ' + (err.message || err) + '. Puedes llenar el formulario manualmente, o subirlo después desde el caso.');
    });
  }

  // ── Guardar ──────────────────────────────────────────────────────────

  function guardarNuevoCaso(boton) {
    var datos = recolectarFormCaso_();

    if (!datos.Tipo_Siniestro) return mostrarError('Debes seleccionar el tipo de siniestro.');
    if (!datos.Nombre_Trabajador) return mostrarError('Falta el nombre del trabajador.');
    if (!datos.Fecha_Siniestro) return mostrarError('Falta la fecha del siniestro.');
    if (!datos.Gravedad) return mostrarError('Debes seleccionar la gravedad — determina qué documentos se exigen.');
    if (!datos.Numero_Siniestro_Mutual) return mostrarError('Falta el N° de siniestro Mutual — usa un valor provisorio si todavía no te lo asignan (ej: PENDIENTE-001) y corrígelo después.');

    conSpinner(boton, llamar('crearCaso', datos)).then(function (resultado) {
      mostrarToast('Caso ' + resultado.caso.ID_Caso + ' creado. Carpeta y checklist generados en Drive.', 'exito');

      function archivarEn_(idItemCatalogo, archivo, etiqueta) {
        var item = resultado.documentos.filter(function (d) { return d.ID_Item_Catalogo === idItemCatalogo; })[0];
        if (!item) return;
        llamar('subirDocumento', item.ID_Registro, archivo.base64, archivo.mimeType, archivo.nombre, false)
          .then(function () { mostrarToast(etiqueta + ' archivada en la carpeta del caso.', 'exito'); })
          .catch(function (err) { mostrarError('El caso se creó, pero ' + etiqueta + ' no se pudo archivar automáticamente: ' + (err.message || err)); });
      }

      if (state.diatPendiente) archivarEn_('DE-01', state.diatPendiente, 'La DIAT');
      if (state.diepPendiente) archivarEn_('DIEP-01', state.diepPendiente, 'La DIEP');
      if (state.ocrPendiente) archivarEn_('INV-01', state.ocrPendiente, 'El informe de investigación');

      navegarA('caso-detalle', resultado.caso.ID_Caso);
    }).catch(mostrarError);
  }
</script>

  <!-- ── JavaScript_CasoDetalle.html ── -->
  <script>
  function cargarCasoDetalle(idCaso) {
    elTopbarTitulo('Caso ' + idCaso);
    actualizarBreadcrumb_([{ label: 'Inicio', vista: 'dashboard' }, { label: 'Casos', vista: 'casos' }, { label: idCaso }]);
    elContenido().innerHTML = '<div class="vacio">Cargando caso…</div>';
    state.tabCasoActual = 'datos';

    llamar('obtenerCaso', idCaso).then(function (data) {
      state.casoActual = data;
      renderCasoDetalle();
    }).catch(mostrarError);
  }

  function renderCasoDetalle() {
    var d = state.casoActual;
    var c = d.caso;

    var pctDocs = calcularPctDocumentos_(d.documentos);

    var html = '<div class="tarjeta" style="margin-bottom:18px; display:flex; justify-content:space-between; align-items:center;">' +
      '<div>' +
        '<h1 style="margin-bottom:6px;">' + escapeHtml(c.Nombre_Trabajador) + ' <span class="mono" style="font-size:14px; color:var(--texto-tenue);">· ' + escapeHtml(c.ID_Caso) + '</span></h1>' +
        '<div style="display:flex; gap:8px; align-items:center;">' + pillEstadoCaso(c.Estado_Caso) + pillGravedad(c.Gravedad) +
          '<span style="font-size:12.5px; color:var(--texto-secundario);">' + escapeHtml(c.Cliente || '') + ' · ' + escapeHtml(c.Fecha_Siniestro || '') + '</span>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex; gap:8px;">' +
        (c.URL_Carpeta_Drive ? '<a class="btn btn-secundario" href="' + c.URL_Carpeta_Drive + '" target="_blank">Abrir carpeta en Drive</a>' : '') +
        botonesEstadoCaso_(c) +
      '</div>' +
    '</div>';

    html += '<div class="tabs">' +
      tabBtn_('datos', 'Datos generales') +
      tabBtn_('medidas', 'Medidas correctivas (' + d.medidas.length + ')') +
      tabBtn_('licencias', 'Licencias médicas (' + d.licencias.length + ')') +
      tabBtn_('documentos', 'Documentos (' + pctDocs.cargados + '/' + pctDocs.total + ')') +
      tabBtn_('historial', 'Historial') +
    '</div>';

    html += '<div id="tab-contenido"></div>';

    elContenido().innerHTML = html;
    renderTabActual();
  }

  function tabBtn_(id, label) {
    return '<div class="tab' + (state.tabCasoActual === id ? ' activo' : '') + '" onclick="cambiarTabCaso(\'' + id + '\', this)">' + label + '</div>';
  }

  function cambiarTabCaso(id, el) {
    state.tabCasoActual = id;
    document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('activo'); });
    el.classList.add('activo');
    renderTabActual();
  }

  function renderTabActual() {
    var cont = document.getElementById('tab-contenido');
    if (state.tabCasoActual === 'datos') {
      cont.innerHTML = renderTabDatos_();
      if (state.editandoDatosCaso) pintarFormCaso_(state.casoActual.caso);
    }
    else if (state.tabCasoActual === 'medidas') renderTabMedidas();
    else if (state.tabCasoActual === 'licencias') renderTabLicencias();
    else if (state.tabCasoActual === 'documentos') renderTabDocumentos();
    else if (state.tabCasoActual === 'historial') cont.innerHTML = renderTabHistorial_();
  }

  function botonesEstadoCaso_(c) {
    var html = '';
    if (puede('editar_caso') && c.Estado_Caso !== 'cerrado') {
      html += '<button class="btn btn-secundario" onclick="completarConInvestigacionUI_()">Completar con informe de investigación</button>';
    }
    if (puede('cerrar_caso')) {
      html += c.Estado_Caso === 'cerrado'
        ? '<button class="btn btn-secundario" onclick="accionCaso(\'reabrirCaso\')">Reabrir caso</button>'
        : '<button class="btn btn-primario" onclick="accionCaso(\'cerrarCaso\')">Cerrar caso</button>';
    }
    if (puede('eliminar_caso')) {
      html += '<button class="btn btn-texto" style="color:var(--estado-critico);" onclick="eliminarCasoUI_()">Eliminar caso</button>';
    }
    return html;
  }

  function completarConInvestigacionUI_() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/pdf';
    input.onchange = function () {
      var file = input.files[0];
      if (!file) return;
      mostrarToast('Leyendo informe de investigación…');
      leerArchivoBase64(file).then(function (archivo) {
        return llamar('ocrExtraerDatosDesdeInforme', archivo.base64, archivo.mimeType, archivo.nombre).then(function (res) {
          return { archivo: archivo, campos: res.campos };
        });
      }).then(function (resultado) {
        abrirModalRevisionInvestigacion_(resultado.archivo, resultado.campos);
      }).catch(mostrarError);
    };
    input.click();
  }

  function abrirModalRevisionInvestigacion_(archivo, campos) {
    var caso = state.casoActual.caso;
    var camposQueSeLlenarian = Object.keys(campos).filter(function (c) { return campos[c] && c !== 'Causa_Raiz' && !caso[c]; });

    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>Completar caso con la investigación</h2>' +
        '<p style="font-size:12.5px; color:var(--texto-secundario); margin-bottom:12px;">' +
          (camposQueSeLlenarian.length > 0
            ? 'Se completarán ' + camposQueSeLlenarian.length + ' campo(s) que estaban vacíos en el caso (por ejemplo, si venía creado desde la DIAT). Lo que ya tenías cargado no se pisa.'
            : 'No hay campos vacíos que completar — de todas formas se actualiza la causa raíz y se archiva el PDF.') +
        '</p>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Causa raíz (extraída del informe — revísala)</label><textarea id="inv-causa-raiz">' + escapeHtml(campos.Causa_Raiz || '') + '</textarea></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Grupo de causa</label><select id="inv-grupo-causa" onchange="actualizarCategoriasCausaModal_(this.value)">' +
          [['', 'Selecciona…']].concat(GRUPOS_CAUSAS.map(function (g) { return [g, g]; })).map(function (o) { return '<option value="' + o[0] + '">' + o[1] + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Categoría de causa</label><select id="inv-categoria-causa"><option value="">Elige primero un grupo…</option></select></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="confirmarCompletarInvestigacion_(this)">Aplicar y archivar informe</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
    state.investigacionPendiente = { archivo: archivo, campos: campos };
  }

  function actualizarCategoriasCausaModal_(grupo) {
    var select = document.getElementById('inv-categoria-causa');
    var categorias = CATEGORIAS_POR_GRUPO[grupo] || [];
    select.innerHTML = categorias.length === 0
      ? '<option value="">Elige primero un grupo…</option>'
      : '<option value="">Selecciona…</option>' + categorias.map(function (c) { return '<option value="' + c + '">' + c + '</option>'; }).join('');
  }

  function confirmarCompletarInvestigacion_(boton) {
    var pendiente = state.investigacionPendiente;
    if (!pendiente) return;
    var idCaso = state.casoActual.caso.ID_Caso;
    var campos = Object.assign({}, pendiente.campos, {
      Causa_Raiz: document.getElementById('inv-causa-raiz').value.trim(),
      Grupo_Causa: document.getElementById('inv-grupo-causa').value,
      Categoria_Causa: document.getElementById('inv-categoria-causa').value
    });

    conSpinner(boton, llamar('completarCasoConInvestigacion', idCaso, campos)).then(function (data) {
      state.casoActual = data;
      cerrarModal();
      mostrarToast('Caso completado con la investigación.', 'exito');

      var item = data.documentos.filter(function (d) { return d.ID_Item_Catalogo === 'INV-01'; })[0];
      if (item) {
        llamar('subirDocumento', item.ID_Registro, pendiente.archivo.base64, pendiente.archivo.mimeType, pendiente.archivo.nombre, false)
          .then(function (documentos) {
            state.casoActual.documentos = documentos;
            mostrarToast('Informe de investigación archivado en el checklist.', 'exito');
            renderCasoDetalle();
          }).catch(function (err) { mostrarError('Se completaron los datos, pero el PDF no se pudo archivar: ' + (err.message || err)); renderCasoDetalle(); });
      } else {
        renderCasoDetalle();
      }
    }).catch(mostrarError);
  }

  function accionCaso(nombreFuncion) {
    confirmarAccion(nombreFuncion === 'cerrarCaso' ? '¿Cerrar este caso?' : '¿Reabrir este caso?').then(function (ok) {
      if (!ok) return;
      llamar(nombreFuncion, state.casoActual.caso.ID_Caso).then(function (data) {
        state.casoActual = data;
        mostrarToast('Caso actualizado.', 'exito');
        renderCasoDetalle();
      }).catch(mostrarError);
    });
  }

  function eliminarCasoUI_() {
    var idCaso = state.casoActual.caso.ID_Caso;
    confirmarAccion('¿Eliminar definitivamente el caso ' + idCaso + ' del sistema? Los datos del caso, sus medidas y su checklist se borrarán. La carpeta de Drive con los documentos NO se toca — quedará intacta como respaldo. Esta acción no se puede deshacer.').then(function (ok) {
      if (!ok) return;
      llamar('eliminarCaso', idCaso).then(function () {
        mostrarToast('Caso ' + idCaso + ' eliminado.', 'exito');
        navegarA('casos');
      }).catch(mostrarError);
    });
  }

  function calcularPctDocumentos_(documentos) {
    var relevantes = documentos.filter(function (d) { return d.Estado !== 'no_aplica'; });
    var cargados = relevantes.filter(function (d) { return d.Estado === 'cargado'; }).length;
    return { cargados: cargados, total: relevantes.length };
  }

  // ── Tab: Datos generales ────────────────────────────────────────────

  function bloqueDatos_(titulo, icono, campos) {
    return '<div class="grupo-datos">' +
      '<div class="bloque-header"><span class="bh-icono">' + ICONOS[icono] + '</span>' + titulo + '</div>' +
      '<div class="grid-datos">' +
        campos.map(function (f) {
          var valor = escapeHtml(f[1]);
          return '<div class="dato-item"><span class="di-label">' + f[0] + '</span>' +
            (valor ? '<span class="di-valor">' + valor + '</span>' : '<span class="di-valor vacio">Sin registrar</span>') +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  function bloqueNarrativo_(titulo, icono, texto, tagsHtml) {
    var vacio = !texto;
    return '<div class="grupo-datos">' +
      '<div class="bloque-header"><span class="bh-icono">' + ICONOS[icono] + '</span>' + titulo + '</div>' +
      (tagsHtml || '') +
      '<div class="bloque-narrativo' + (vacio ? ' vacio' : '') + '"><p>' + (vacio ? 'Sin registrar.' : escapeHtml(texto)) + '</p></div>' +
    '</div>';

      html += '<div style="display:flex; justify-content:flex-end; margin-bottom:10px;">' +
        '<button class="btn btn-secundario" onclick="activarEdicionCaso_()">Editar datos</button>' +
      '</div>';
    }

    html += bloqueDatos_('Trabajador', 'persona', [
      ['Nombre', c.Nombre_Trabajador], ['RUT', c.RUT_Trabajador], ['Cargo', c.Cargo],
      ['Edad', c.Edad], ['Región', c.Region], ['Legalidad', c.Legalidad]
    ]);

    html += bloqueDatos_('Empresa y contrato', 'empresa', [
      ['Dependencia', c.Dependencia], ['Empresa', c.Nombre_Empresa], ['Cliente', c.Cliente],
      ['Proyecto', c.Proyecto], ['Tipo de servicio', c.Tipo_Servicio], ['Sucursal', c.Sucursal], ['Fecha contrato', c.Fecha_Contrato],
      ['Supervisor a cargo', c.Supervisor_A_Cargo]
    ]);

    html += bloqueDatos_('Siniestro', 'alerta', [
      ['Tipo de siniestro', c.Tipo_Siniestro], ['Calificación', c.Calificacion],

  function guardarEdicionCaso(boton) {
    var datos = recolectarFormCaso_();
    if (!datos.Nombre_Trabajador) return mostrarError('Falta el nombre del trabajador.');
    if (!datos.Fecha_Siniestro) return mostrarError('Falta la fecha del siniestro.');

    var casoOriginal = state.casoActual.caso;
    var cambiaGravedad = datos.Gravedad !== casoOriginal.Gravedad;
    var cambiaTipo = datos.Tipo_Siniestro !== casoOriginal.Tipo_Siniestro;

    var confirmacion = (cambiaGravedad || cambiaTipo)
      ? confirmarAccion('Vas a cambiar ' + (cambiaGravedad && cambiaTipo ? 'la gravedad y el tipo de siniestro' : cambiaGravedad ? 'la gravedad' : 'el tipo de siniestro') + ' de este caso. Se agregarán al checklist los documentos nuevos que correspondan — no se borra nada de lo ya cargado. ¿Confirmas?')
      : Promise.resolve(true);

    confirmacion.then(function (ok) {
      if (!ok) return;
      conSpinner(boton, llamar('actualizarCaso', state.casoActual.caso.ID_Caso, datos)).then(function (data) {
        state.casoActual = data;
        state.editandoDatosCaso = false;
        mostrarToast('Caso actualizado.', 'exito');
        if (data.docsAgregados > 0) {
          mostrarToast('Se agregaron ' + data.docsAgregados + ' documento(s) nuevo(s) al checklist por el cambio de gravedad/tipo de siniestro.', 'exito');
        }
        renderCasoDetalle();
      }).catch(mostrarError);
    });
  }

  function celdaEvidenciaMedida_(m) {
    var html = '';
    if (m.Evidencia_URL) {
      html += '<a class="btn btn-texto" style="font-size:12px; padding:2px 4px;" href="' + m.Evidencia_URL + '" target="_blank">Ver archivo</a>';
    } else {
      html += '<span class="pill pill-alerta">Sin evidencia</span>';
    }
    if (puede('editar_medida')) {
      html += '<button class="btn btn-texto" style="font-size:12px; padding:2px 4px;" onclick="adjuntarEvidenciaMedida_(\'' + m.ID_Medida + '\')">' + (m.Evidencia_URL ? 'Reemplazar' : 'Adjuntar') + '</button>';

  function adjuntarEvidenciaMedida_(idMedida) {
    var input = document.createElement('input');
    input.type = 'file';
    input.onchange = function () {
      var file = input.files[0];
      if (!file) return;
      leerArchivoBase64(file).then(function (archivo) {
        mostrarToast('Subiendo evidencia…');
        return llamar('subirEvidenciaMedida', idMedida, archivo.base64, archivo.mimeType, archivo.nombre);
      }).then(function (medidas) {
        state.casoActual.medidas = medidas;
        mostrarToast('Evidencia adjuntada a la medida.', 'exito');
        renderTabMedidas();
      }).catch(mostrarError);
    };
    input.click();

    var opciones = ['abierta', 'en_curso', 'cerrada'].filter(function (e) { return e !== m.Estado; });

  var UMBRAL_DIAS_LICENCIA_SOSPECHOSO = 180;

  function previsualizarDiasLicencia_() {
    var inicio = document.getElementById('lic-inicio').value;
    var termino = document.getElementById('lic-termino').value;
    var preview = document.getElementById('lic-preview');
    if (!inicio || !termino) {
      preview.textContent = 'Los días se calculan solos a partir de las fechas (ambos días inclusive).';
      preview.style.color = 'var(--texto-tenue)';
      return;
    }
    var dias = calcularDiasEntre_(inicio, termino);
    if (!dias) {
      preview.textContent = 'La fecha de término debe ser igual o posterior a la de inicio.';
      preview.style.color = 'var(--estado-critico)';
      return;
    }
    if (dias > UMBRAL_DIAS_LICENCIA_SOSPECHOSO) {
      preview.textContent = '⚠ Son ' + dias + ' días — revisa el año de la fecha de término, es un rango poco habitual para una sola licencia.';
      preview.style.color = 'var(--estado-critico)';
    } else {
      preview.textContent = 'Son ' + dias + ' días.';
      preview.style.color = 'var(--texto-secundario)';
    }
  }

  function guardarLicencia(boton) {
    var inicio = document.getElementById('lic-inicio').value;
    var termino = document.getElementById('lic-termino').value;
    if (!inicio) return mostrarError('Falta la fecha de inicio.');

    var datos = { Tipo: document.getElementById('lic-tipo').value, Fecha_Inicio: inicio, Fecha_Termino: termino, Origen: 'Manual' };
    var dias = termino ? calcularDiasEntre_(inicio, termino) : null;

    var confirmacion = (dias && dias > UMBRAL_DIAS_LICENCIA_SOSPECHOSO)
      ? confirmarAccion('Esta licencia queda en ' + dias + ' días (de ' + inicio + ' a ' + termino + '). Es un rango poco habitual para una sola licencia — revisa que el año esté bien antes de guardar. ¿Confirmas que es correcto?')
      : Promise.resolve(true);

    confirmacion.then(function (ok) {
      if (!ok) return;
      conSpinner(boton, llamar('crearLicencia', state.casoActual.caso.ID_Caso, datos)).then(function (licencias) {
        state.casoActual.licencias = licencias;
        cerrarModal();
        mostrarToast('Licencia registrada.', 'exito');
        state.tabCasoActual = 'licencias';
        renderCasoDetalle();
      }).catch(mostrarError);
    });
  }
</script>

  <!-- ── JavaScript_Documentos.html ── -->
  <script>
  var ETIQUETAS_CATEGORIA = {
    Antecedentes_Trabajador: 'Antecedentes del trabajador',
    Licencias_Medicas: 'Licencias médicas',
    Denuncias: 'Denuncias (DIAT / DIEP)',
    Investigacion: 'Investigación y evidencia',
    Medidas_Correctivas: 'Medidas correctivas',
    Prevencion_EPP: 'Prevención y EPP',
    Fiscalizacion_DT_Seremi: 'Fiscalización DT / SEREMI',
    Otros: 'Otros'
  };
  var ORDEN_CATEGORIAS = Object.keys(ETIQUETAS_CATEGORIA);

  function renderTabDocumentos() {
    var cont = document.getElementById('tab-contenido');
    var docs = state.casoActual.documentos;
    var pct = calcularPctDocumentos_(docs);
    var pctNum = pct.total > 0 ? Math.round((pct.cargados / pct.total) * 100) : 0;

    var html = '<div class="tarjeta" style="margin-bottom:16px;">' +
      '<div style="display:flex; justify-content:space-between; margin-bottom:8px;">' +
        '<strong>' + pct.cargados + ' de ' + pct.total + ' documentos cargados (' + pctNum + '%)</strong>' +
        (puede('subir_documento') ? '<button class="btn btn-texto" onclick="abrirModalDocumentoAdicional()">+ Agregar ítem no listado</button>' : '') +
      '</div>' +
      '<div class="barra-progreso"><div class="barra-progreso-relleno" style="width:' + pctNum + '%;"></div></div>' +
    '</div>';

    var porCategoria = {};
    docs.forEach(function (d) {
      (porCategoria[d.Categoria] = porCategoria[d.Categoria] || []).push(d);
    });

    ORDEN_CATEGORIAS.concat(Object.keys(porCategoria).filter(function (c) { return ORDEN_CATEGORIAS.indexOf(c) === -1; }))
      .forEach(function (cat) {
        var items = porCategoria[cat];
        if (!items || items.length === 0) return;
        html += '<div class="checklist-categoria">' +
          '<div class="checklist-categoria-header"><span>' + (ETIQUETAS_CATEGORIA[cat] || cat) + '</span>' +
          '<span class="mono" style="font-weight:400; text-transform:none;">' + items.filter(function (i) { return i.Estado === 'cargado'; }).length + '/' + items.length + '</span></div>' +
          items.map(renderItemChecklist_).join('') +
        '</div>';
      });

    cont.innerHTML = html;
  }

  function renderItemChecklist_(d) {
    var acciones = '';
    if (puede('subir_documento')) {
      acciones += '<button class="btn btn-secundario" style="padding:5px 10px; font-size:12px;" onclick="dispararCargaArchivo(\'' + d.ID_Registro + '\', false)">' +
        (d.Estado === 'cargado' ? 'Nueva versión' : 'Cargar') + '</button>';
    }
    if (d.Estado === 'cargado' && d.URL_Drive) {
      acciones += '<a class="btn btn-texto" style="padding:5px 6px; font-size:12px;" href="' + d.URL_Drive + '" target="_blank">Ver (v' + d.Version + ')</a>';
    }
    if (d.Estado === 'cargado' && puede('sobrescribir_documento')) {
      acciones += '<button class="btn btn-texto" style="padding:5px 6px; font-size:12px; color:var(--estado-critico);" onclick="dispararCargaArchivo(\'' + d.ID_Registro + '\', true)">Sobrescribir</button>';
    }
    if (d.Estado === 'pendiente' && puede('subir_documento')) {
      acciones += '<button class="btn btn-texto" style="padding:5px 6px; font-size:12px;" onclick="marcarDocNoAplica(\'' + d.ID_Registro + '\')">No aplica</button>';
    }

    return '<div class="checklist-item">' +
      pillEstadoDoc(d.Estado) +
      '<div class="ci-nombre">' + escapeHtml(d.Nombre_Documento) + (d.Es_Personalizado ? ' <span class="pill pill-neutro" style="font-size:10px;">agregado</span>' : '') +
        (d.Condicion_Adicional ? '<div class="ci-condicion">' + escapeHtml(d.Condicion_Adicional) + '</div>' : '') +
      '</div>' +
      '<div class="ci-acciones">' + acciones + '</div>' +
    '</div>';
  }

  function dispararCargaArchivo(idRegistro, sobrescribir) {
    var input = document.createElement('input');
    input.type = 'file';
    input.onchange = function () {
      var file = input.files[0];
      if (!file) return;

      var accionPromesa = sobrescribir
        ? confirmarAccion('Esto reemplazará el archivo cargado actualmente para este ítem. La versión anterior no quedará disponible dentro del sistema. ¿Continuar?')
        : Promise.resolve(true);

      accionPromesa.then(function (ok) {
        if (!ok) return;
        leerArchivoBase64(file).then(function (archivo) {
          mostrarToast('Subiendo archivo…');
          return llamar('subirDocumento', idRegistro, archivo.base64, archivo.mimeType, archivo.nombre, sobrescribir);
        }).then(function (documentos) {
          state.casoActual.documentos = documentos;
          mostrarToast(sobrescribir ? 'Archivo sobrescrito.' : 'Documento cargado.', 'exito');
          renderTabDocumentos();
        }).catch(mostrarError);
      });
    };
    input.click();
  }

  function marcarDocNoAplica(idRegistro) {
    confirmarAccion('¿Marcar este ítem como "no aplica" para este caso?').then(function (ok) {
      if (!ok) return;
      llamar('marcarNoAplica', idRegistro, '').then(function (documentos) {
        state.casoActual.documentos = documentos;
        mostrarToast('Ítem marcado como no aplica.', 'exito');
        renderTabDocumentos();
      }).catch(mostrarError);
    });
  }

  function abrirModalDocumentoAdicional() {
    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>Agregar ítem no listado</h2>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Nombre del documento *</label><input type="text" id="da-nombre"></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Categoría / carpeta destino</label>' +
          '<select id="da-categoria">' +
            ORDEN_CATEGORIAS.map(function (c) { return '<option value="' + c + '">' + ETIQUETAS_CATEGORIA[c] + '</option>'; }).join('') +
          '</select></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="guardarDocumentoAdicional(this)">Agregar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
  }

  function guardarDocumentoAdicional(boton) {
    var nombre = document.getElementById('da-nombre').value.trim();
    if (!nombre) return mostrarError('El nombre del documento es obligatorio.');
    var categoria = document.getElementById('da-categoria').value;

    conSpinner(boton, llamar('agregarDocumentoAdicional', state.casoActual.caso.ID_Caso, nombre, categoria)).then(function (documentos) {
      state.casoActual.documentos = documentos;
      cerrarModal();
      mostrarToast('Ítem agregado al checklist.', 'exito');
      state.tabCasoActual = 'documentos';
      renderCasoDetalle(); // repinta encabezado (contador de documentos) + tab activo correcto
    }).catch(mostrarError);
  }
</script>

  <!-- ── Catálogo de documentos ── -->
  <script>
  // ── Administración del catálogo de documentos (solo administrador) ──

  function cargarCatalogo() {
    elTopbarTitulo('Catálogo de documentos');
    actualizarBreadcrumb_([{ label: 'Inicio', vista: 'dashboard' }, { label: 'Catálogo de documentos' }]);
    elContenido().innerHTML = '<div class="vacio">Cargando…</div>';
    llamar('listarCatalogo').then(function (items) {
      state.catalogo = items;
      renderCatalogo();
    }).catch(mostrarError);
  }

  function renderCatalogo() {
    var html = '<p style="font-size:12.5px; color:var(--texto-secundario); margin-bottom:14px;">' +
      'Estos son los ítems que se copian automáticamente al checklist de cada caso nuevo, según su gravedad. ' +
      'Editar aquí NO afecta el checklist de casos ya creados — solo los que se creen de ahora en adelante.</p>';

    if (puede('gestionar_catalogo')) {
      html += '<div style="display:flex; justify-content:flex-end; margin-bottom:14px;">' +
        '<button class="btn btn-primario" onclick="abrirModalItemCatalogo()">+ Agregar ítem al catálogo</button>' +
      '</div>';
    } else {
      html += '<div class="tarjeta" style="margin-bottom:14px; border-left:3px solid var(--estado-alerta); background:var(--estado-alerta-bg);">' +
        'Agregar o desactivar ítems requiere el <a href="#" onclick="activarModoAdmin_(); return false;" style="color:var(--color-primario); font-weight:600;">modo administrador</a>.</div>';
    }

    var porCategoria = {};
    state.catalogo.forEach(function (it) { (porCategoria[it.Categoria] = porCategoria[it.Categoria] || []).push(it); });

    ORDEN_CATEGORIAS.concat(Object.keys(porCategoria).filter(function (c) { return ORDEN_CATEGORIAS.indexOf(c) === -1; }))
      .forEach(function (cat) {
        var items = porCategoria[cat];
        if (!items || items.length === 0) return;
        html += '<div class="tarjeta" style="margin-bottom:16px; padding:0;">' +
          '<div style="padding:14px 18px; border-bottom:1px solid var(--borde); font-family:var(--fuente-condensada); font-weight:600; font-size:13px; color:var(--color-primario); text-transform:uppercase; letter-spacing:.03em;">' +
            (ETIQUETAS_CATEGORIA[cat] || cat) +
          '</div>' +
          items.map(function (it) {
            var cuando = it.Aplica_Siempre ? 'Siempre' : [
              it.Aplica_Solo_Leve ? 'Leve / IAP' : null,
              it.Aplica_Solo_Grave_NT142 ? 'Grave' : null,
              it.Aplica_Solo_Fatal ? 'Fatal' : null
            ].filter(Boolean).join(' + ');
            return '<div class="checklist-item">' +
              '<span class="pill ' + (it.Activo ? 'pill-ok' : 'pill-neutro') + '">' + (it.Activo ? 'Activo' : 'Inactivo') + '</span>' +
              '<div class="ci-nombre">' + escapeHtml(it.Nombre_Documento) +
                '<div class="ci-condicion">Aplica: ' + escapeHtml(cuando || '—') + (it.Condicion_Adicional ? ' · ' + escapeHtml(it.Condicion_Adicional) : '') + '</div>' +
              '</div>' +
              '<div class="ci-acciones">' + (puede('gestionar_catalogo')
                ? '<button class="btn btn-texto" style="font-size:12px;" onclick="toggleActivoCatalogoUI(\'' + it.ID_Item + '\', ' + !it.Activo + ')">' + (it.Activo ? 'Desactivar' : 'Reactivar') + '</button>'
                : '') + '</div>' +
            '</div>';
          }).join('') +
        '</div>';
      });

    elContenido().innerHTML = html;
  }

  function abrirModalItemCatalogo() {
    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>Agregar ítem al catálogo</h2>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Nombre del documento *</label><input type="text" id="cat-nombre" placeholder="Ej: Acta de reunión de coordinación"></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Categoría / carpeta destino</label>' +
          '<select id="cat-categoria">' + ORDEN_CATEGORIAS.map(function (c) { return '<option value="' + c + '">' + ETIQUETAS_CATEGORIA[c] + '</option>'; }).join('') + '</select></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>¿Cuándo se exige?</label>' +
          '<label style="display:flex; align-items:center; gap:6px; font-weight:400; margin-bottom:4px;"><input type="checkbox" id="cat-siempre" style="width:auto;"> Siempre, en todo caso</label>' +
          '<label style="display:flex; align-items:center; gap:6px; font-weight:400; margin-bottom:4px;"><input type="checkbox" id="cat-leve" style="width:auto;"> Solo si es Leve o Incidente de Alto Potencial</label>' +
          '<label style="display:flex; align-items:center; gap:6px; font-weight:400; margin-bottom:4px;"><input type="checkbox" id="cat-grave" style="width:auto;"> Solo si es Grave o Fatal</label>' +
          '<label style="display:flex; align-items:center; gap:6px; font-weight:400;"><input type="checkbox" id="cat-fatal" style="width:auto;"> Solo si es Fatal</label>' +
        '</div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Condición adicional (opcional)</label><input type="text" id="cat-condicion" placeholder="Ej: Solo si participaron subcontratistas"></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="guardarItemCatalogoUI(this)">Agregar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
  }

  function guardarItemCatalogoUI(boton) {
    var nombre = document.getElementById('cat-nombre').value.trim();
    if (!nombre) return mostrarError('El nombre del documento es obligatorio.');
    var datos = {
      Nombre_Documento: nombre, Categoria: document.getElementById('cat-categoria').value,
      Aplica_Siempre: document.getElementById('cat-siempre').checked,
      Aplica_Solo_Leve: document.getElementById('cat-leve').checked,
      Aplica_Solo_Grave_NT142: document.getElementById('cat-grave').checked,
      Aplica_Solo_Fatal: document.getElementById('cat-fatal').checked,
      Condicion_Adicional: document.getElementById('cat-condicion').value.trim()
    };
    if (!datos.Aplica_Siempre && !datos.Aplica_Solo_Leve && !datos.Aplica_Solo_Grave_NT142 && !datos.Aplica_Solo_Fatal) {
      return mostrarError('Marca al menos una condición de cuándo se exige este documento.');
    }
    conSpinner(boton, llamar('agregarItemCatalogo', datos)).then(function (items) {
      state.catalogo = items;
      cerrarModal();
      mostrarToast('Ítem agregado al catálogo. Se usará en los próximos casos que se creen.', 'exito');
      renderCatalogo();
    }).catch(mostrarError);

  function toggleActivoCatalogoUI(idItem, nuevoActivo) {
    llamar('cambiarActivoCatalogo', idItem, nuevoActivo).then(function (items) {
      state.catalogo = items;
      mostrarToast(nuevoActivo ? 'Ítem reactivado.' : 'Ítem desactivado.', 'exito');
      renderCatalogo();
    }).catch(mostrarError);
  }

  // ── Importar nómina Mutual ───────────────────────────────────────────

  function cargarImportarNomina_() {
    elTopbarTitulo('Importar nómina Mutual');
    actualizarBreadcrumb_([{ label: 'Inicio', vista: 'dashboard' }, { label: 'Importar nómina Mutual' }]);
    state.importacionNomina = null;
    elContenido().innerHTML =
      '<div class="tarjeta">' +
        '<h3 style="margin-bottom:4px;">Sube el Excel de la nómina de Mutual</h3>' +
        '<p style="font-size:12.5px; color:var(--texto-secundario); margin-bottom:14px;">' +
          'Se procesa acá mismo, en tu navegador — no se sube a ningún servidor externo. Reconoce el formato estándar de Mutual ' +
          '(columnas Rut Trabajador, Motivo de denuncia, Fechas de reposo, N° de siniestro, etc.). ' +
          'Para cada fila, busca un caso existente por N° de siniestro o por RUT del trabajador.' +
        '</p>' +
        '<div class="zona-carga" onclick="document.getElementById(\'input-nomina\').click()" id="zona-nomina">&#8593; Haz clic para seleccionar el Excel (.xlsx)</div>' +
        '<input type="file" id="input-nomina" accept=".xlsx,.xls" style="display:none;" onchange="procesarNominaExcel_(this)">' +
      '</div>';
  }

  function procesarNominaExcel_(input) {
    var file = input.files[0];
    if (!file) return;
    var zona = document.getElementById('zona-nomina');
    zona.innerHTML = '<span class="spinner" style="border-top-color:var(--color-acento); border-color:var(--borde);"></span> Leyendo archivo…';

    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var datos = new Uint8Array(e.target.result);
        var libro = XLSX.read(datos, { type: 'array' });
        var hoja = libro.Sheets[libro.SheetNames[0]];
        var filas = XLSX.utils.sheet_to_json(hoja, { header: 1, raw: false, defval: '' });
        var registros = parsearNominaMutual_(filas);
        if (registros.length === 0) {
          zona.innerHTML = '&#8593; Haz clic para seleccionar el Excel (.xlsx)';
          mostrarError('No se reconocieron filas válidas en el archivo. Revisa que sea el formato estándar de la nómina Mutual.');
          return;
        }
        elContenido().innerHTML = '<div class="vacio"><span class="spinner"></span> Comparando contra los casos existentes…</div>';
        llamar('listarCasos').then(function (casos) { mostrarResultadoImportacion_(registros, casos); }).catch(mostrarError);
      } catch (err) {
        zona.innerHTML = '&#8593; Haz clic para seleccionar el Excel (.xlsx)';
        mostrarError('No se pudo leer el archivo: ' + (err.message || err));
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function mostrarResultadoImportacion_(registros, casos) {
    var coincidencias = [], sinExpediente = [];
    registros.forEach(function (fila) {
      var caso = emparejarFilaConCaso_(fila, casos);
      if (caso) coincidencias.push({ fila: fila, caso: caso });
      else sinExpediente.push(fila);
    });
    state.importacionNomina = { coincidencias: coincidencias, sinExpediente: sinExpediente };

    var html = '<div class="tarjeta" style="margin-bottom:16px;">' +
      '<strong>' + registros.length + '</strong> filas leídas de la nómina — ' +
      '<strong style="color:var(--estado-ok);">' + coincidencias.length + '</strong> con caso existente en el sistema, ' +
      '<strong style="color:var(--estado-critico);">' + sinExpediente.length + '</strong> sin expediente.' +
    '</div>';

    if (coincidencias.length > 0) {
      html += '<div class="tarjeta" style="margin-bottom:16px; padding:0;">' +
        '<div style="padding:16px 18px 0;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">' +
          '<h3 style="margin:0;">Coincidencias — actualizar licencias médicas (' + coincidencias.length + ')</h3>' +
          (puede('crear_licencia') ? '<button class="btn btn-primario" onclick="aplicarImportacionCoincidencias_(this)">Importar todas</button>' : '') +
        '</div></div>' +
        '<table class="tabla"><thead><tr><th>Trabajador</th><th>Caso</th><th>N° siniestro</th><th>Reposo</th><th>Días</th></tr></thead><tbody>' +
        coincidencias.map(function (item) {
          return '<tr onclick="navegarA(\'caso-detalle\',\'' + item.caso.ID_Caso + '\')">' +
            '<td>' + escapeHtml(item.fila.nombreCompleto) + '</td>' +
            '<td class="mono">' + escapeHtml(item.caso.ID_Caso) + '</td>' +
            '<td class="mono">' + escapeHtml(item.fila.numeroSiniestro) + '</td>' +
            '<td class="mono">' + escapeHtml(item.fila.fechaInicioReposo || '—') + ' → ' + escapeHtml(item.fila.fechaTerminoReposo || 'en curso') + '</td>' +
            '<td class="mono">' + item.fila.diasReposo + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div>';
    }

    if (sinExpediente.length > 0) {
      html += '<div class="tarjeta" style="padding:0;">' +
        '<div style="padding:16px 18px 0;"><h3 style="margin-bottom:4px;">Accidentes en la nómina sin expediente (' + sinExpediente.length + ')</h3>' +
        '<p style="font-size:12px; color:var(--texto-tenue); margin-bottom:12px;">No calzan por RUT ni N° de siniestro con ningún caso — probablemente todavía no tienen expediente armado en el sistema.</p></div>' +
        '<table class="tabla"><thead><tr><th>Trabajador</th><th>RUT</th><th>Tipo</th><th>N° siniestro</th><th>Reposo</th><th></th></tr></thead><tbody>' +
        sinExpediente.map(function (fila, i) {
          return '<tr style="cursor:default;">' +
            '<td>' + escapeHtml(fila.nombreCompleto) + '</td>' +
            '<td class="mono">' + escapeHtml(fila.rutFormateado) + '</td>' +
            '<td>' + escapeHtml(fila.tipoSiniestro) + '</td>' +
            '<td class="mono">' + escapeHtml(fila.numeroSiniestro) + '</td>' +
            '<td class="mono">' + escapeHtml(fila.fechaInicioReposo || '—') + '</td>' +
            '<td>' + (puede('crear_caso') ? '<button class="btn btn-texto" style="font-size:12px;" onclick="crearCasoDesdeNomina_(' + i + ')">Crear caso</button>' : '') + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div>';
    }

    elContenido().innerHTML = html;
  }

  function aplicarImportacionCoincidencias_(boton) {
    var coincidencias = state.importacionNomina.coincidencias;
    conSpinner(boton, Promise.all(coincidencias.map(function (item) {
      return llamar('importarLicenciaDesdeNomina', item.caso.ID_Caso, item.fila);
    }))).then(function () {
      mostrarToast(coincidencias.length + ' licencia(s) actualizada(s) desde la nómina.', 'exito');
      navegarA('casos');
    }).catch(mostrarError);
  }

  function crearCasoDesdeNomina_(indice) {
    var fila = state.importacionNomina.sinExpediente[indice];
    state.prefillNuevoCaso = {
      Nombre_Trabajador: fila.nombreCompleto, RUT_Trabajador: fila.rutFormateado,
      Tipo_Siniestro: fila.tipoSiniestro, Numero_Siniestro_Mutual: fila.numeroSiniestro,
      Fecha_Siniestro: fila.fechaInicioReposo, Dias_Reposo: fila.diasReposo || ''
    };
    mostrarToast('Datos de la nómina precargados en el formulario — falta que definas la gravedad y completes el resto.', 'exito');
    navegarA('nuevo-caso');
  }

  // ── Restablecer datos ("modo dios", solo administrador) ─────────────
  // Regla dura: no se puede eliminar nada sin haber descargado antes el
  // respaldo completo en esta misma pantalla — el botón de eliminar
  // permanece deshabilitado hasta que la descarga se complete.

  function cargarRestablecerDatos_() {
    elTopbarTitulo('Restablecer datos');
    actualizarBreadcrumb_([{ label: 'Inicio', vista: 'dashboard' }, { label: 'Restablecer datos' }]);
    state.respaldoPrevioDescargado = false;

    if (!state.modoAdministrador) {
      elContenido().innerHTML = '<div class="tarjeta vacio">Esta pantalla requiere modo administrador.</div>';
      return;
    }

    elContenido().innerHTML =
      '<div class="tarjeta" style="margin-bottom:20px; border-left:3px solid var(--estado-critico); background:var(--estado-critico-bg);">' +
        '<strong style="color:var(--estado-critico);">Esto elimina datos de verdad y no se puede deshacer.</strong>' +
        '<p style="margin-top:6px; font-size:13px;">Elige qué quieres eliminar, descarga el respaldo (es obligatorio) y recién ahí se habilita el botón de eliminar.</p>' +
      '</div>' +
      '<div class="tarjeta" style="margin-bottom:20px;">' +
        '<h3 style="margin-bottom:14px;">¿Qué quieres eliminar?</h3>' +
        '<label style="display:flex; align-items:flex-start; gap:8px; margin-bottom:14px; font-weight:400; cursor:pointer;">' +
          '<input type="checkbox" id="rst-casos" style="width:auto; margin-top:2px;" checked>' +
          '<span><strong>Todos los casos</strong><br>' +
          '<span style="font-size:12px; color:var(--texto-secundario);">Incluye sus medidas correctivas, licencias médicas, checklist de documentos e historial. El catálogo de documentos NO se toca con esta opción.</span></span>' +
        '</label>' +
        '<label style="display:flex; align-items:flex-start; gap:8px; font-weight:400; cursor:pointer;">' +
          '<input type="checkbox" id="rst-catalogo" style="width:auto; margin-top:2px;">' +
          '<span><strong>Catálogo de documentos personalizado</strong><br>' +
          '<span style="font-size:12px; color:var(--texto-secundario);">Vuelve a los 43 ítems de fábrica (v1) — se pierden los ítems que hayas agregado o desactivado a mano.</span></span>' +
        '</label>' +
      '</div>' +
      '<div class="tarjeta" style="margin-bottom:20px;">' +
        '<h3 style="margin-bottom:4px;">Paso 1 — Descargar respaldo</h3>' +
        '<p style="font-size:12.5px; color:var(--texto-secundario); margin-bottom:12px;">Obligatorio antes de poder eliminar cualquier cosa — un ZIP con un CSV por hoja.</p>' +
        '<button class="btn btn-secundario" id="btn-respaldo-previo" onclick="descargarRespaldoPrevio_(this)">Descargar respaldo (ZIP con CSV)</button>' +
        '<span id="respaldo-ok" style="margin-left:10px; color:var(--estado-ok); font-size:13px; display:none;">&#10003; Respaldo descargado — ya puedes eliminar</span>' +
      '</div>' +
      '<div class="tarjeta">' +
        '<h3 style="margin-bottom:12px;">Paso 2 — Eliminar</h3>' +
        '<button class="btn" id="btn-eliminar-todo" disabled style="background:var(--estado-critico); color:#fff; opacity:.45; cursor:not-allowed;" onclick="confirmarRestablecerDatos_()">Eliminar los datos seleccionados</button>' +
      '</div>';
  }

  function descargarRespaldoPrevio_(boton) {
    conSpinner(boton, llamar('exportarRespaldoCompletoZIP')).then(function (res) {
      descargarBase64_(res.base64, res.nombreArchivo, 'application/zip');
      mostrarToast('Respaldo descargado: ' + res.nombreArchivo + '. Ya puedes eliminar si quieres.', 'exito');
      state.respaldoPrevioDescargado = true;
      document.getElementById('respaldo-ok').style.display = 'inline';
      var btnEliminar = document.getElementById('btn-eliminar-todo');
      btnEliminar.disabled = false;
      btnEliminar.style.opacity = '1';
      btnEliminar.style.cursor = 'pointer';
    }).catch(mostrarError);
  }

  function confirmarRestablecerDatos_() {
    if (!state.respaldoPrevioDescargado) { mostrarError('Primero descarga el respaldo (Paso 1).'); return; }

    var incluyeCasos = document.getElementById('rst-casos').checked;
    var incluyeCatalogo = document.getElementById('rst-catalogo').checked;
    if (!incluyeCasos && !incluyeCatalogo) { mostrarError('Marca al menos una opción de lo que quieres eliminar.'); return; }

    var frase = prompt('Esta acción no se puede deshacer, ni con el modo administrador. Para confirmar, escribe exactamente: ELIMINAR');
    if (frase === null) return;
    if (frase.trim() !== 'ELIMINAR') { mostrarToast('No se escribió "ELIMINAR" exacto — cancelado, no se borró nada.', 'error'); return; }

    llamar('restablecerDatos', { casos: incluyeCasos, catalogo: incluyeCatalogo }).then(function () {
      mostrarToast('Datos eliminados.', 'exito');
      navegarA('dashboard');
    }).catch(mostrarError);
  }
</script>

     - Tipo de usuario: "Interno" si tienes Google Workspace (recomendado),

     - Completa nombre de la app, correo de soporte, y guarda.
   - Luego: APIs y servicios → Credenciales → Crear credenciales →

   - En "Orígenes de JavaScript autorizados" agrega la URL exacta donde

   - Copia el "Client ID" resultante (termina en .apps.googleusercontent.com)
     y pégalo en CONFIG.CLIENT_ID al inicio de este archivo.

   IMPORTANTE: el login de Google NO funciona abriendo el archivo con
   doble clic (protocolo file://) — necesita un origen http/https real.
   Por eso el punto 3 es obligatorio, no opcional.

3) ALOJAR ESTE ARCHIVO EN ALGÚN LUGAR CON URL PROPIA
   - Crea un repositorio en GitHub (privado si tu plan lo permite, o

   - Sube este archivo (puedes llamarlo index.html).
   - Activa GitHub Pages: Settings → Pages → Deploy from branch → main.
   - La URL que te entregue GitHub Pages es la que compartes con tu equipo,
     y es la misma que debes registrar en el paso 2 como origen autorizado.

4) LA PRIMERA VEZ QUE LO ABRES
   - Verás "Conectar con Google" → inicia sesión con la cuenta que va a ser
     dueña de la planilla y la carpeta.
   - Como CONFIG.SPREADSHEET_ID y CONFIG.ROOT_FOLDER_ID están vacíos, verás

   - Copia los dos IDs que te muestra, pégalos en CONFIG al inicio de este

     mismos datos en vivo.

SOBRE EL MODO ADMINISTRADOR Y LA SEGURIDAD (léelo, es importante)
   Al conectarte con Google, el sistema toma tu nombre y correo automático
   desde tu cuenta (no hay que escribirlo). Casi todas las acciones están
   disponibles para cualquiera que abra el sistema — solo eliminar un caso
   y editar el catálogo de documentos piden el "modo administrador", que
   se activa con una clave que definen ustedes mismos la primera vez que
   alguien lo intenta. Esa clave (con hash simple, no cifrado real) vive
   en la hoja Configuracion de la planilla — por eso funciona igual desde
   cualquier PC que se conecte, a diferencia de una clave guardada en el
   navegador. No es seguridad real: es un cerrojo simple contra errores o
   clics accidentales entre las personas del equipo. El límite de
   seguridad real sigue siendo quién tiene acceso a la cuenta de Google
   dueña de la planilla y la carpeta.

SOBRE LAS CARPETAS EN DRIVE
   Cada caso crea su propia carpeta dentro de la raíz, nombrada
   "[Nombre del trabajador]_[N° de siniestro Mutual]", con 8 subcarpetas
   fijas por categoría (Antecedentes, Licencias médicas, Denuncias DIAT/

   obligatorio al crear el caso — si Mutual todavía no lo asigna, se usa
   un valor provisorio (ej: PENDIENTE-001) y se corrige después editando
   el caso (la carpeta no se renombra sola si cambias el número más tarde:
   hazlo a mano en Drive si es necesario).

SOBRE EL OCR
   Usa la conversión nativa de Drive (subir el PDF pidiendo que se
   convierta a Google Doc con OCR activado) — no hay IA de por medio, es
   reconocimiento óptico de caracteres estándar de Google. Para la DIAT,
   solo se intenta reconocer los campos escritos a mano/máquina (RUT,
   nombres, direcciones, fechas, horas, descripción) — los campos de
   casillero marcado con X (gravedad, tipo de accidente) NUNCA se leen
   por OCR de forma confiable y siempre quedan para selección manual.
   Para el informe de investigación, busca los rótulos fijos del formato
   ZN-FT-SST-050. Cálibralo con PDFs reales antes de confiar en él a
   ciegas — el formulario siempre queda editable antes de guardar.
